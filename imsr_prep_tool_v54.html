function qualifiesForIMSR(f) {
  // IMT override — always qualifies
  if (f.hasIMT) return { qualifies: true, reason: 'Nationally recognized IMT assigned' };

  const acres = parseInt((f.f7 || '').replace(/,/g, '')) || 0;
  if (acres < 100) return { qualifies: false, reason: `${acres.toLocaleString()} acres — below 100-acre minimum` };

  // Fuel models and their acre thresholds, in canonical ICS-209 checkbox order.
  // Threshold is determined by the FIRST (topmost) fuel model listed on the 209.
  const FUEL_THRESHOLDS = [
    { pat: /Closed\s+Timber\s+Litter/i,  threshold: 100, label: 'closed timber litter' },
    { pat: /Hardwood\s+Litter/i,          threshold: 100, label: 'hardwood litter' },
    { pat: /Timber\s*\(\s*Grass\s+and\s+Understory\s*\)/i, threshold: 300, label: 'timber (grass and understory)' },
    { pat: /Timber/i,                      threshold: 100, label: 'timber' },
    { pat: /Heavy\s+Slash/i,              threshold: 100, label: 'heavy slash' },
    { pat: /Medium\s+Slash/i,             threshold: 100, label: 'medium slash' },
    { pat: /Light\s+Slash/i,              threshold: 100, label: 'light slash' },
    { pat: /Short\s+Grass/i,              threshold: 300, label: 'grass' },
    { pat: /Tall\s+Grass/i,               threshold: 300, label: 'grass' },
    { pat: /\bGrass\b/i,                 threshold: 300, label: 'grass' },
    { pat: /Chaparral/i,                   threshold: 300, label: 'chaparral' },
    { pat: /Brush/i,                       threshold: 300, label: 'brush' },
    { pat: /Dormant\s+Brush/i,            threshold: 300, label: 'dormant brush' },
    { pat: /Southern\s+Rough/i,           threshold: 300, label: 'southern rough' },
  ];

  const raw = (f.f29 || '').replace(/\blogging\s+/gi, '');

  // Find position of each fuel model in the raw F29 text
  const hits = [];
  for (const { pat, threshold, label } of FUEL_THRESHOLDS) {
    const m = pat.exec(raw);
    if (m) hits.push({ pos: m.index, len: -m[0].length, threshold, label });
  }

  if (!hits.length) {
    // No recognized fuel — qualify at 300+ acres only
    if (acres >= 300) return { qualifies: true, reason: '300+ acres (no recognized fuel model)' };
    return { qualifies: false, reason: `${acres.toLocaleString()} acres — no recognized fuel model` };
  }

  // Sort by position — first listed fuel determines the threshold
  hits.sort((a, b) => a.pos - b.pos || a.len - b.len);  // tie-break: longer match wins
  const first = hits[0];

  if (acres >= first.threshold) {
    return { qualifies: true, reason: `${acres.toLocaleString()} acres with ${first.label} (${first.threshold}-acre threshold)` };
  }
  return { qualifies: false, reason: `${acres.toLocaleString()} acres — ${first.label} requires ${first.threshold}+ acres` };
}
// Normalize incident name: ALL CAPS → title case. >2 words → title case each word
function normalizeName(name) {
  if (!name) return name;
  // Strip trailing "Fire" (case-insensitive)
  name = name.trim().replace(/\s+fire$/i, '').trim();
  const isAllCaps = name === name.toUpperCase() && /[A-Z]{2,}/.test(name);
  const words = name.trim().split(/\s+/);
  if (isAllCaps || words.length > 2) {
    return words.map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
  }
  return words.map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

function spellMiles(str) {
  if (!str) return str;
  // Protect state abbreviations (2-letter caps after comma+space or at end) before
  // direction substitution — otherwise NE (Nebraska), ME, etc. get clobbered.
  // Strategy: temporarily replace ", XX" state suffix with a placeholder.
  const STATE_RE = /,\s*([A-Z]{2})(?=\s*$|\s*[.,])/g;
  const placeholders = [];
  str = str.replace(STATE_RE, (match, abbr) => {
    placeholders.push(abbr);
    return ', STATE' + (placeholders.length - 1) + '';
  });

  // Spell out cardinal directions
  str = str
    .replace(/\bNNE\b/g, 'north-northeast')
    .replace(/\bNNW\b/g, 'north-northwest')
    .replace(/\bSSE\b/g, 'south-southeast')
    .replace(/\bSSW\b/g, 'south-southwest')
    .replace(/\bNE\b/g,  'northeast')
    .replace(/\bNW\b/g,  'northwest')
    .replace(/\bSE\b/g,  'southeast')
    .replace(/\bSW\b/g,  'southwest')
    .replace(/\bN\b/g,   'north')
    .replace(/\bS\b/g,   'south')
    .replace(/\bE\b/g,   'east')
    .replace(/\bW\b/g,   'west');

  // Restore state abbreviations
  str = str.replace(/STATE(\d+)/g, (_, i) => placeholders[+i]);
  // Mid-sentence number rule: spell out if < 10, numeral if >= 10
  // Also normalize mile/miles: singular if 1, plural otherwise, always lowercase
  return str.replace(/\b(\d+)(\s*[Mm]iles?\b)/g, (match, num, suffix) => {
    const n = parseInt(num);
    const word = n === 1 ? ' mile' : ' miles';
    return (n < 10 ? spellNum(n) : String(n)) + word;
  });
}


function capitalizeSentenceStart(sentence) {
  // If sentence starts with a digit, spell it out with initial cap
  const m = sentence.match(/^(\d+)(\s+)/);
  if (m) {
    const spelled = spellNum(parseInt(m[1]));
    return spelled.charAt(0).toUpperCase() + spelled.slice(1) + m[2] + sentence.slice(m[0].length);
  }
  return sentence.charAt(0).toUpperCase() + sentence.slice(1);
}

function spellNum(n) {
  const ones = ['zero','one','two','three','four','five','six','seven','eight','nine',
                'ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen',
                'seventeen','eighteen','nineteen'];
  const tens = ['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
  if (n < 20) return ones[n];
  if (n < 100) {
    const t = tens[Math.floor(n / 10)];
    const o = n % 10;
    return t + (o ? '-' + ones[o] : '');
  }
  if (n < 1000) {
    const h = ones[Math.floor(n / 100)];
    const rest = n % 100;
    return h + ' hundred' + (rest ? ' ' + spellNum(rest) : '');
  }
  return String(n);
}

// Clean fuels: per-line strip parens + after-comma, normalize all grass, join with no oxford comma
function cleanFuels(raw) {
  if (!raw) return '';
  // Strip "logging" prefix before slash weights
  const s = raw.replace(/\blogging\s+/gi, '');

  // Each pattern matches the full checkbox item including parens.
  // "Dormant Brush, Hardwood Slash" is ONE ICS-209 checkbox — match it explicitly.
  // No generic after-comma grabber — it swallows subsequent fuel types in space-joined PDF text.
  const FUEL_PATTERNS = [
    { pat: /Closed\s+Timber\s+Litter(?:\s*\([^)]*\))?/i, out: 'closed timber litter' },
    { pat: /Hardwood\s+Litter(?:\s*\([^)]*\))?/i,         out: 'hardwood litter' },
    { pat: /Timber(?:\s*\([^)]*\))?/i,                     out: 'timber' },
    { pat: /Heavy\s+Slash(?:\s*\([^)]*\))?/i,              out: 'heavy slash' },
    { pat: /Medium\s+Slash(?:\s*\([^)]*\))?/i,             out: 'medium slash' },
    { pat: /Light\s+Slash(?:\s*\([^)]*\))?/i,              out: 'light slash' },
    { pat: /Southern\s+Rough(?:\s*\([^)]*\))?/i,           out: 'southern rough' },
    { pat: /Dormant\s+Brush(?:,\s*Hardwood\s+Slash)?(?:\s*\([^)]*\))?/i, out: 'dormant brush' },
    { pat: /Chaparral(?:\s*\([^)]*\))?/i,                   out: 'chaparral' },
    { pat: /Brush(?:\s*\([^)]*\))?/i,                       out: 'brush' },
    { pat: /Short\s+Grass(?:\s*\([^)]*\))?/i,              out: 'grass' },
    { pat: /Tall\s+Grass(?:\s*\([^)]*\))?/i,               out: 'grass' },
    { pat: /\bGrass(?:\s*\([^)]*\))?\b/i,                 out: 'grass' },
  ];

  // Collect ALL occurrences of every pattern with their span
  const hits = [];
  for (const { pat, out } of FUEL_PATTERNS) {
    const re = new RegExp(pat.source, 'gi');
    let m;
    while ((m = re.exec(s)) !== null) {
      hits.push({ start: m.index, end: m.index + m[0].length, out });
    }
  }
  hits.sort((a, b) => a.start - b.start);

  // Greedy accept: claim every non-overlapping span; record output name only once
  const found = [], spans = [];
  for (const h of hits) {
    if (!spans.some(([a, b]) => a < h.end && h.start < b)) {
      spans.push([h.start, h.end]);      // always claim the span
      if (!found.includes(h.out)) found.push(h.out);  // name only once
    }
  }

  if (!found.length) return '';
  found[0] = found[0].charAt(0).toUpperCase() + found[0].slice(1);
  if (found.length === 1) return found[0];
  if (found.length === 2) return found[0] + ' and ' + found[1];
  return found.slice(0, -1).join(', ') + ' and ' + found[found.length - 1];
}

// Clean fire behavior: first line + "fire behavior with" + remaining lines, comma-separated, all lowercase
function cleanBehavior(raw) {
  if (!raw) return '';

  const INTENSITY = ['Extreme', 'Active', 'Moderate', 'Minimal'];
  const DESCRIPTORS = [
    'Crowning', 'Short Crown Runs', 'Uphill Runs', 'Wind Driven Runs',
    'Running', 'Flanking', 'Backing', 'Creeping',
    'Torching', 'Group Torching', 'Single Tree Torching', 'Isolated Torching',
    'Spotting', 'Long-range Spotting', 'Short-range Spotting', 'Smoldering',
  ];

  const normTerm = t => t.toLowerCase().replace(/wind driven runs/i, 'wind-driven runs');

  // Strip page-break header ("Incident Status Summary...Incident: NAME") that gets
  // injected when box 28 spans pages. Lookahead stops at the next known behavior term
  // so post-header terms are preserved regardless of newline vs space-joined text.
  const allTerms = [...INTENSITY, ...DESCRIPTORS];
  const termsAlt = allTerms.slice().sort((a,b) => b.length - a.length)
                            .map(t => t.replace(/[-]/g, '\\-')).join('|');
  const cleaned = raw.replace(
    new RegExp('Incident Status Summary[\\s\\S]*?(?=' + termsAlt + ')', 'gi'), ''
  );

  // Find intensity (first match in ordered list)
  let intensity = null;
  for (const term of INTENSITY) {
    if (new RegExp('\\b' + term + '\\b', 'i').test(cleaned)) { intensity = term.toLowerCase(); break; }
  }

  // Find all descriptor matches with span — overlap detection prevents
  // "Torching" firing when "Group Torching" already claimed that region, etc.
  const hits = [];
  for (const term of DESCRIPTORS) {
    const re = new RegExp(term.replace(/[-]/g, '\\-'), 'i');
    const m = re.exec(cleaned);
    if (m) hits.push({ start: m.index, end: m.index + m[0].length, term: normTerm(term) });
  }
  hits.sort((a, b) => a.start - b.start);

  const accepted = [], spans = [];
  for (const h of hits) {
    if (!spans.some(([a, b]) => a < h.end && h.start < b)) {
      accepted.push(h.term);
      spans.push([h.start, h.end]);
    }
  }

  // Torching severity: if multiple torching types accepted, keep only most severe
  // group torching > isolated torching > single tree torching > torching (generic)
  const torchingTerms = accepted.filter(t => /torching/i.test(t));
  let filteredAccepted = accepted;
  if (torchingTerms.length > 1) {
    let keepTorch = torchingTerms[0];
    if (torchingTerms.some(t => t === 'group torching'))       keepTorch = 'group torching';
    else if (torchingTerms.some(t => t === 'isolated torching')) keepTorch = 'isolated torching';
    else if (torchingTerms.some(t => t === 'single tree torching')) keepTorch = 'single tree torching';
    filteredAccepted = accepted.filter(t => !/torching/i.test(t));
    filteredAccepted.push(keepTorch);
  }
  const descriptors = filteredAccepted.slice(0, 3);

  if (!intensity && !descriptors.length) return '';
  const first = intensity ? intensity.charAt(0).toUpperCase() + intensity.slice(1) : '';
  if (!descriptors.length) return `${first} fire behavior`;
  if (descriptors.length === 1) return `${first} fire behavior with ${descriptors[0]}`;
  if (descriptors.length === 2) return `${first} fire behavior with ${descriptors[0]} and ${descriptors[1]}`;
  return `${first} fire behavior with ${descriptors[0]}, ${descriptors[1]} and ${descriptors[2]}`;
}

// Threatened structures label — no count, "numerous" if 99+
function threatenedStatement(f) {
  // ── Structures part ───────────────────────────────────────────────────
  const hasRes = f.resThreatened > 0;
  const hasStr = f.strThreatened > 0;
  const strLabel = (hasRes && hasStr) ? 'structures' : hasRes ? 'residences' : hasStr ? 'structures' : '';
  const strCount = hasRes && hasStr
    ? Math.max(f.resThreatened, f.strThreatened)
    : hasRes ? f.resThreatened : f.strThreatened;
  const numerous = strCount >= 100 ? 'Numerous ' : '';

  // ── Infrastructure part ───────────────────────────────────────────────
  const infra = f._infra || {};
  const infraTypes = (infra.energy ? 1 : 0) + (infra.communication ? 1 : 0) + (infra.railroad ? 1 : 0);
  let infraLabel = '';
  if (infraTypes >= 2) infraLabel = 'critical infrastructure';
  else if (infra.energy)        infraLabel = 'energy infrastructure';
  else if (infra.communication) infraLabel = 'communication infrastructure';
  else if (infra.railroad)      infraLabel = 'railroad infrastructure';

  // ── Combine ───────────────────────────────────────────────────────────
  if (strLabel && infraLabel) {
    // e.g. "Numerous structures and energy infrastructure threatened"
    return numerous + strLabel + ' and ' + infraLabel + ' threatened';
  } else if (strLabel) {
    return numerous + strLabel + ' threatened';
  } else if (infraLabel) {
    // Capitalize first word since it starts the sentence
    return infraLabel.charAt(0).toUpperCase() + infraLabel.slice(1) + ' threatened';
  }
  return '';
}

// Capitalize first letter after every period in a narrative sentence string
function capitalizeSentences(str) {
  return str.replace(/(^|\.\s+)([a-z])/g, (m, p1, p2) => p1 + p2.toUpperCase());
}

// Normalize location string to sentence case — title-case words, keep directionals upper
function normalizeLocation(str) {
  if (!str) return str;
  // Words to keep as-is (directionals, state abbreviations)
  const keep = new Set(['NE','NW','SE','SW','N','S','E','W','NNE','NNW','SSE','SSW',
    'AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS',
    'KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY',
    'NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY']);
  return str.replace(/\b([A-Z][A-Z]+)\b/g, (word) => {
    if (keep.has(word)) return word;
    // All-caps word that isn't a known abbreviation — title case it
    return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
  });
}

function buildNarrativeLine(f) {
  const name = normalizeName(fv(f.f1));
  const location = normalizeLocation(spellMiles(fv(f.f25, '')));
  const fuels = cleanFuels(f.f29);
  const behavior = cleanBehavior(f.f28);

  const parts = [];

  // Origin land statement — private or different agency than managing org
  if (f.privateLand && location) {
    parts.push('Started on private land ' + location);
  } else if (f.startedOnLand && location) {
    parts.push('Started on ' + f.startedOnLand + ' land ' + location);
  } else if (location) {
    parts.push(capitalizeSentenceStart(location));
  }

  if (fuels) parts.push(fuels);
  if (behavior) parts.push(behavior);

  // Structures + infrastructure (combined into one statement)
  const threatened = threatenedStatement(f);
  if (threatened) parts.push(threatened);

  // ART closures/evacuations
  if (f.f34) parts.push(f.f34);

  // NARR-46 special statement order: sage-grouse → reduction → precipitation (in renderNarrative) → last report
  // (1) Sage-grouse habitat
  if (f._sageGrouse) {
    parts.push('Sage-grouse habitat threatened');
  }

  // (2) Acreage reduction — only when prev IMSR loaded and acres decreased
  const prevForAcres = prevMatch(f);
  const todayAc = parseInt((f.f7 || '').replace(/,/g,'')) || 0;
  if (prevForAcres && prevForAcres.acres > 0 && todayAc > 0 && prevForAcres.acres > todayAc) {
    parts.push('Reduction in acreage due to more accurate mapping');
  }

  // (3) Precipitation — handled in renderNarrative via user confirmation toggle

  // (4) Last report — kick-off removal tranche only
  if (isLastReport(f) && !lastRptLabelOff.has(f.f2)) {
    parts.push('Last report unless significant activity occurs');
  }

  return { name, parts };
}

function fv(v, fallback='---') { return (v && v.trim()) ? v.trim() : fallback; }

const COLS = [
  { head: 'Incident Name', id: 'name',    manual: false },
  { head: 'Unit',          id: 'unit',    manual: false },
  { head: 'Total Acres',   id: 'acres',   manual: false },
  { head: 'Chge in Acres', id: 'chgeac',  manual: true  },
  { head: '%',             id: 'pct',     manual: false },
  { head: 'Ctn/Comp',      id: 'ctn',     manual: false },
  { head: 'Est',           id: 'est',     manual: false },
  { head: 'Total PPL',     id: 'ppl',     manual: false },
  { head: 'Chge in PPL',   id: 'chgeppl', manual: true  },
  { head: 'Crw',           id: 'crw',     manual: false },
  { head: 'Eng',           id: 'eng',     manual: false },
  { head: 'Heli',          id: 'heli',    manual: false },
  { head: 'Strc Lost',     id: 'strc',    manual: false },
  { head: '$$ CTD',        id: 'cost',    manual: false },
  { head: 'Origin Own',    id: 'own',     manual: false },
];

function getColVals(f) {
  const prev = prevMatch(f);
  const isNew = !prev;  // true = new fire (asterisk), false = returning

  // Delta columns
  let chgeAc = '', chgePpl = '';
  if (prev) {
    const todayAc  = parseInt((f.f7  || '').replace(/,/g,'')) || 0;
    const todayPpl = parseInt(f.totalPers) || 0;
    const dAc  = todayAc  - prev.acres;
    const dPpl = todayPpl - prev.ppl;
    chgeAc  = dAc.toLocaleString();
    chgePpl = dPpl.toLocaleString();
  } else if (f.isInitial || prevIMSR) {
    // New fire: --- if Box 3 = Initial OR if prev IMSR is loaded and fire has no match
    chgeAc  = '---';
    chgePpl = '---';
  }

  return {
    name:    (isNew ? '* ' : '') + normalizeName(fv(f.f1)),
    unit:    fv(f.unit),
    acres:   fv(f.f7),
    chgeac:  chgeAc,
    pct:     fv(f.f8a, '0'),
    ctn:     'Ctn',
    est:     fv(f.f43),
    ppl:     fv(f.totalPers),
    chgeppl: chgePpl,
    crw:     String(f.resources.crews || 0),
    eng:     String(f.resources.engines || 0),
    heli:    String(f.resources.helicopters || 0),
    strc:    String((f.resDestroyed || 0) + (f.strDestroyed || 0) || 0),
    cost:    formatCost(f.f45),
    own:     fv(f.originOwn),
    _isNew:  isNew,
  };
}

function buildTableRows(incidents) {
  return incidents.map((f) => {
    const cv = getColVals(f);
    const tds = COLS.map(c => {
      if (c.manual) {
        const val = cv[c.id];
        const isEmpty = (val === undefined || val === null || val === '');
        if (isEmpty) {
          // No prev IMSR — editable input; data-copyval="" so copy reads typed value or "---"
          return `<td class="manual" data-copyval=""><input type="text" placeholder="---" style="width:56px;background:transparent;border:none;outline:none;font-family:Arial,sans-serif;font-size:9pt;color:var(--text);text-align:center;"></td>`;
        }
        if (val === '---') {
          // Pre-filled static (initial report)
          return `<td class="manual" data-copyval="---" style="color:var(--text);">---</td>`;
        }
        // Calculated from prev IMSR — store value in data-copyval for reliable copy
        const display = val.startsWith('+') ? val.slice(1) : val;
        return `<td class="manual" data-copyval="${display}">${display}</td>`;
      }
      const v = cv[c.id];
      return `<td class="${(!v || v==='---') ? 'empty' : ''}">${v}</td>`;
    }).join('');
    // Build row classes
    const classes = [];
    if (is100(f)) classes.push('ctn100');
    const prev = prevMatch(f);
    if (prev && prev.pct >= 100 && is100(f)) classes.push('returning-100');
    const pctV = parseInt(f.f8a || 0);
    if ((f.isFinal && pctV < 100) || (!f.isFinal && pctV >= 100)) classes.push('discrep');
    const classAttr = classes.length ? ` class="${classes.join(' ')}"` : '';
    return `<tr${classAttr}>${tds}</tr>`;
  }).join('');
}


function buildNarrativeLines(incidents, cssClass='') {
  return incidents.map((f) => {
    const { name, parts } = buildNarrativeLine(f);
    const sentence = capitalizeSentences(parts.join('. ') + (parts.length ? '.' : ''));
    const managingOrg = (lookupUnit(f.unit) || fv(f.unit) || '').replace(/\s*\([A-Z]{2}\)$/,'') || '<span class="blank">[MANAGING ORG]</span>';
    const cimtLabel = f.hasNIMO ? '. NIMO (___)' : f.hasCIMT ? '. CIMT (___)' : '';
    const precipFlag = f._precipDetected
      ? `<span class="precip-flag${f._precipConfirmed ? ' confirmed' : ''}" title="Definitive precipitation detected in boxes 35/40/47" onclick="event.stopPropagation();togglePrecip(this,'${f.f2}')">🌧 ${f._precipConfirmed ? 'Precip added' : 'Add precip statement'}</span>`
      : '';
    const prev = prevMatch(f);
    const isNew = !prev;
    const asterisk = isNew ? '* ' : '';
    const lastRptBadge = (prev && prev.wasLastReport) ? '<span class="last-rpt-badge" title="Previous IMSR contained a last-report statement.">LAST RPT</span>' : '';
    const lastRptClass = (prev && prev.wasLastReport) ? ' last-rpt' : '';

    // Returning 100% fire — was in prev IMSR and still 100%
    const ret100 = (prev && prev.pct >= 100 && is100(f)) ? ' returning-100' : '';
    const ret100Badge = (prev && prev.pct >= 100 && is100(f)) ? '<span class="ret100-badge" title="Returning fire still at 100% contained — was 100% in previous IMSR">RET 100%</span>' : '';

    // Box 3 vs Box 8a discrepancy
    const pctVal = parseInt(f.f8a || 0);
    const box3Discrep = (f.isFinal && pctVal < 100) || (!f.isFinal && pctVal >= 100);
    const discrepClass = box3Discrep ? ' discrep' : '';
    const discrepBadge = box3Discrep ? `<span class="discrep-badge" title="${f.isFinal ? 'Box 3 = Final but % contained is ' + pctVal + '%' : 'Box 8a = ' + pctVal + '% but Box 3 is not Final'}">BOX 3/8a ✗</span>` : '';

    // Kick-off controls: toggle label and/or move to active
    let kickoffControls = '';
    const pct = parseInt(f.f8a || 0);
    const ppl = parseInt(f.totalPers || 0);
    const meetsKickoff = pct >= 90 && pct < 100 && ppl < 100;
    if (meetsKickoff) {
      const labelOff = lastRptLabelOff.has(f.f2);
      const forcedActive = lastRptForceActive.has(f.f2);
      const labelBtn = `<span class="kickoff-toggle${labelOff ? ' toggled' : ''}" title="${labelOff ? 'Restore last-report statement' : 'Remove last-report statement'}" onclick="event.stopPropagation();toggleLastRptLabel('${f.f2}')">${labelOff ? '✓ Label removed' : '✕ Remove label'}</span>`;
      const activeBtn = `<span class="kickoff-toggle${forcedActive ? ' toggled' : ''}" title="${forcedActive ? 'Return to kick-off sort' : 'Move to active sort'}" onclick="event.stopPropagation();toggleForceActive('${f.f2}')">${forcedActive ? '↑ In active' : '↑ Move to active'}</span>`;
      kickoffControls = labelBtn + activeBtn;
    }

    // 100% contained — blue highlight matching table rows
    const ctn100Class = is100(f) ? ' ctn100' : '';

    const delBtn = `<button class="narr-del" title="Remove this fire" onclick="deleteSingleFire('${f.f2}','')">✕</button>`;
    return `<div class="narr-line ${cssClass}${lastRptClass}${ret100}${discrepClass}${ctn100Class}" data-inc="${f.f2}" data-pct="${f.f8a || 0}"><b>${asterisk}${name}</b>${lastRptBadge}${ret100Badge}${discrepBadge}, ${managingOrg}${cimtLabel}. ${sentence}${precipFlag}${kickoffControls}${delBtn}</div>`;
  }).join('<div class="narr-spacer"><br></div>');
}

// "Last report" fires: >90% contained AND <100 total personnel (not yet 100%)
function isLastReport(f) {
  // If Intel forced this fire back to active, it's not a last-report fire
  if (lastRptForceActive.has(f.f2)) return false;
  const pct = parseInt(f.f8a || 0);
  const ppl = parseInt(f.totalPers || 0);
  return pct >= 90 && pct < 100 && ppl < 100;
}

// Tranche order (Option A — severity-driven, new/old is tiebreaker):
//   T0    — CIMT/NIMO, active         → SEQ-11 (new above old as key 9)
//   T0b   — CIMT/NIMO, lastReport     → pct asc
//   T1    — all active (new+returning) → SEQ-11 (new above old as key 9)
//   T1b   — all lastReport             → pct asc
//   T2    — 100% contained             → submit time desc
// A fire is "finaled" (100%) if isFinal is set OR f8a parses to >= 100.
function is100(f) {
  if (f.isFinal) return true;
  const p = parseInt(f.f8a);
  return !isNaN(p) && p >= 100;
}

function trancheSort(incidents) {
  // Option A: 5 buckets — new/old mixed, severity drives order
  const t0 = [], t0b = [], t1 = [], t1b = [], t2 = [];
  incidents.forEach(f => {
    if (is100(f)) { t2.push(f); return; }
    if (f.hasCIMT || f.hasNIMO) {
      isLastReport(f) ? t0b.push(f) : t0.push(f);
      return;
    }
    isLastReport(f) ? t1b.push(f) : t1.push(f);
  });
  // SEQ-11: multi-key sort within active buckets
  // (1) Evacuations  (2) Numerous res/str 100+  (3) Infrastructure
  // (4) Structures threatened <100 (binary)  (5) Behavior intensity Extreme→Low
  // (6) Descriptor severity (best descriptor present)  (7) Closures
  // (8) % contained ascending  (9) New above returning
  const INTENSITY_RANK = { extreme: 0, 'very active': 1, active: 2, moderate: 3, minimal: 4, low: 5 };
  function seq11Rank(f) {
    const evac = (f.f34 && /evacuation/i.test(f.f34)) ? 0 : 1;
    const maxThreat = Math.max(f.resThreatened || 0, f.strThreatened || 0);
    const numerous = maxThreat >= 100 ? 0 : 1;
    const infra = f._infra || {};
    const hasInfra = (infra.energy || infra.communication || infra.railroad) ? 0 : 1;
    const anyThreat = ((f.resThreatened || 0) > 0 || (f.strThreatened || 0) > 0) && maxThreat < 100 ? 0 : 1;
    const raw = (f.f28 || '').toLowerCase();
    let bRank = 6; // no behavior = lowest
    for (const [term, rank] of Object.entries(INTENSITY_RANK)) {
      if (raw.includes(term)) { bRank = rank; break; }
    }
    // Best (lowest) descriptor severity — tiebreaks within same intensity
    // Use regex with word boundaries; check compound terms before generic
    // to avoid "short-range spotting" also matching standalone "spotting"
    let dRank = 5; // no descriptors
    const DESC_CHECKS = [
      [/\bcrowning\b/i, 1], [/\bshort crown runs\b/i, 1], [/\blong[\s-]range spotting\b/i, 1],
      [/\bwind[\s-]driven runs\b/i, 2], [/\brunning\b/i, 2],
      [/\bgroup torching\b/i, 2], [/\buphill runs\b/i, 2],
      [/\bflanking\b/i, 3], [/\bshort[\s-]range spotting\b/i, 3],
      [/\bbacking\b/i, 4], [/\bcreeping\b/i, 4],
      [/\bisolated torching\b/i, 4], [/\bsingle tree torching\b/i, 4], [/\bsmoldering\b/i, 4],
    ];
    // Generic 'spotting'/'torching' only if no compound form already matched
    let hasCompoundSpot = false, hasCompoundTorch = false;
    for (const [re, rank] of DESC_CHECKS) {
      if (re.test(raw)) {
        if (rank < dRank) dRank = rank;
        if (/range spotting/i.test(re.source)) hasCompoundSpot = true;
        if (/group|isolated|single tree/i.test(re.source)) hasCompoundTorch = true;
      }
    }
    if (!hasCompoundSpot && /\bspotting\b/i.test(raw)) { if (2 < dRank) dRank = 2; }
    if (!hasCompoundTorch && /\btorching\b/i.test(raw)) { if (3 < dRank) dRank = 3; }
    const closures = (f.f34 && /closures? in effect/i.test(f.f34)) ? 0 : 1;
    const pct = parseInt(f.f8a || 0);
    const isNew = !prevMatch(f) ? 0 : 1; // new fires first as tiebreaker
    return [evac, numerous, hasInfra, anyThreat, bRank, dRank, closures, pct, isNew];
  }
  function bySEQ11(a, b) {
    const ra = seq11Rank(a), rb = seq11Rank(b);
    for (let i = 0; i < ra.length; i++) {
      if (ra[i] !== rb[i]) return ra[i] - rb[i];
    }
    return 0;
  }
  const byPct    = (a, b) => (parseInt(a.f8a||0)) - (parseInt(b.f8a||0));
  const bySubmit = (a, b) => (b._submitTime || 0) - (a._submitTime || 0);
  t0.sort(bySEQ11); t0b.sort(byPct);
  t1.sort(bySEQ11); t1b.sort(byPct);
  t2.sort(bySubmit);
  return [...t0, ...t0b, ...t1, ...t1b, ...t2];
}

// Manual sort overrides per GACC — stores reordered index arrays for activeInc only
const manualOrder = {};

function moveIncident(gacc, fromIdx, dir) {
  const order = manualOrder[gacc];
  if (!order) return;
  const toIdx = fromIdx + dir;
  if (toIdx < 0 || toIdx >= order.length) return;
  [order[fromIdx], order[toIdx]] = [order[toIdx], order[fromIdx]];
  renderOutput();
}

function renderOutput() {
  // Proceed if we have 209s OR a previous IMSR loaded (missed fires need to render)
  if (!allIncidents.length && !prevIMSR) return;

  const thCells = COLS.map(c => `<th>${c.head}</th>`).join('');

  // Split qualifying / non-qualifying, assign GACC
  const qualifying = [];
  const nonQualifying = [];
  allIncidents.forEach(f => {
    // Skip fires manually deleted by user
    if (deletedFires.has(normKey(f.f1, f.unit))) return;
    const q = qualifiesForIMSR(f);
    f._qualifies = q.qualifies;
    f._qualifyReason = q.reason;
    f._gacc = deriveGACC(f);
    if (q.qualifies) qualifying.push(f);
    else nonQualifying.push(f);
  });

  // Group qualifying by GACC in defined order
  const byGacc = {};
  qualifying.forEach(f => { (byGacc[f._gacc] = byGacc[f._gacc] || []).push(f); });
  // Apply tranche sort to each GACC
  Object.keys(byGacc).forEach(g => { byGacc[g] = trancheSort(byGacc[g]); });

  // Group non-qualifying by GACC (they render at the bottom of each GACC section)
  const nqByGacc = {};
  nonQualifying.forEach(f => { (nqByGacc[f._gacc] = nqByGacc[f._gacc] || []).push(f); });

  // Find missed fires — in prev IMSR (<100%), no matching 209 today
  const missedByGacc = {};
  if (prevIMSR) {
    const matchedKeys = new Set(qualifying.concat(nonQualifying).map(f => normKey(f.f1, f.unit)));
    for (const [key, p] of prevIMSR) {
      if (p.pct >= 100) continue;
      if (matchedKeys.has(key)) continue;
      if (deletedFires.has(key)) continue;
      const unitCode = (p.unit || '').toUpperCase().replace(/-\d+$/, '');
      const gacc = UNIT_GACC_OVERRIDE[unitCode] || STATE_TO_GACC[(p.unit || '').slice(0,2).toUpperCase()] || 'UNKNOWN';
      (missedByGacc[gacc] = missedByGacc[gacc] || []).push(p);
    }
  }

  // GACC keys: qualifying, non-qualifying, OR missed-only GACCs
  // GACCs with any active CIMT or NIMO fire float to the top
  const allGaccKeys = GACC_ORDER.filter(g => byGacc[g] || nqByGacc[g] || missedByGacc[g]);
  const hasCimtGacc = g => (byGacc[g] || []).some(f => (f.hasCIMT || f.hasNIMO) && !is100(f));
  const gaccKeys = [
    ...allGaccKeys.filter(g => hasCimtGacc(g)),
    ...allGaccKeys.filter(g => !hasCimtGacc(g)),
  ];

  // Build each GACC section (narratives + table)
  // Store byGacc on window so moveIncident can re-sort without reparse
  window._byGacc = byGacc;

  const gaccHtml = gaccKeys.map(gacc => {
    const incidents = byGacc[gacc] || [];
    const nqFires   = nqByGacc[gacc] || [];
    const missed    = missedByGacc[gacc] || [];
    const color = GACC_COLORS[gacc] || '#888';

    // Split incidents into active (above missed) and lastReport+100% (below missed)
    let activeInc   = incidents.filter(f => !isLastReport(f) && !is100(f));
    const lastRptInc  = incidents.filter(f =>  isLastReport(f) && !is100(f));
    const containedInc = incidents.filter(f => is100(f));

    // Apply manual sort order to activeInc only — init or reset if count changed
    if (!manualOrder[gacc] || manualOrder[gacc].length !== activeInc.length) {
      manualOrder[gacc] = activeInc.map((_, i) => i);
    }
    activeInc = manualOrder[gacc].map(i => activeInc[i]);

    // Apply manual sort order to lastRptInc — separate order key
    const lrKey = gacc + '_lr';
    if (!manualOrder[lrKey] || manualOrder[lrKey].length !== lastRptInc.length) {
      manualOrder[lrKey] = lastRptInc.map((_, i) => i);
    }
    const sortedLastRpt = manualOrder[lrKey].map(i => lastRptInc[i]);

    // Build sort panel for activeInc
    const sortPanel = activeInc.length > 1 ? `
      <div class="sort-panel">
        ${activeInc.map((f, i) => {
          const pct = parseInt(f.f8a) || 0;
          const moved = manualOrder[gacc][i] !== i;
          const name = (f.f1 || f._filename || '?').slice(0, 40);
          return `<div class="sort-row${moved ? ' sort-moved' : ''}">
            <button class="sort-btn" onclick="moveIncident('${gacc}',${i},-1)" title="Move up">▲</button>
            <button class="sort-btn" onclick="moveIncident('${gacc}',${i},1)" title="Move down">▼</button>
            <span class="sort-name">${name}${moved ? ' ✎' : ''}</span>
            <span class="sort-pct">${pct}%</span>
          </div>`;
        }).join('')}
      </div>` : '';

    // Build sort panel for lastRptInc (kick-off fires)
    const lrSortPanel = sortedLastRpt.length > 1 ? `
      <div class="sort-panel" style="margin-top:4px;border-color:#b090d0;">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:#6a40a0;padding:3px 8px;background:#f0e8f8;border-bottom:1px solid #b090d0;font-weight:600;letter-spacing:.08em;">KICK-OFF</div>
        ${sortedLastRpt.map((f, i) => {
          const pct = parseInt(f.f8a) || 0;
          const moved = manualOrder[lrKey][i] !== i;
          const name = (f.f1 || f._filename || '?').slice(0, 40);
          return `<div class="sort-row${moved ? ' sort-moved' : ''}">
            <button class="sort-btn" onclick="moveIncident('${lrKey}',${i},-1)" title="Move up">▲</button>
            <button class="sort-btn" onclick="moveIncident('${lrKey}',${i},1)" title="Move down">▼</button>
            <span class="sort-name">${name}${moved ? ' ✎' : ''}</span>
            <span class="sort-pct">${pct}%</span>
          </div>`;
        }).join('')}
      </div>` : '';


    // Narrative order: active → lastReport (kick-off) → missed (no 209) → 100%
    const NARR_SPACER = '<div class="narr-spacer"><br></div>';
    const narrGroups = [
      buildNarrativeLines(activeInc),
      buildNarrativeLines(sortedLastRpt),
      buildMissedNarrLines(missed),
      buildNarrativeLines(containedInc),
    ].filter(g => g.length > 0);
    const narrLines = narrGroups.join(NARR_SPACER);

    // Table row order: active → lastReport → missed → 100%
    const tableRows =
      buildTableRows(activeInc) +
      buildTableRows(sortedLastRpt) +
      buildMissedTableRows(missed) +
      buildTableRows(containedInc);

    // Non-qualifying fires — separate labeled section, excluded from copy buttons
    let nqSection = '';
    if (nqFires.length) {
      const nqNarrLines = nqFires.map(f => {
        const { name, parts } = buildNarrativeLine(f);
        const sentence = capitalizeSentences(parts.join('. ') + (parts.length ? '.' : ''));
        const managingOrg = (lookupUnit(f.unit) || fv(f.unit) || '').replace(/\s*\([A-Z]{2}\)$/,'') || '<span class="blank">[MANAGING ORG]</span>';
        const prev = prevMatch(f);
        const asterisk = prev ? '' : '* ';
        return `<div class="narr-line nq" data-inc="${f.f2}" data-pct="${f.f8a || 0}" style="opacity:.7;border-left-color:#c8a050;">
          <b>${asterisk}${name}</b>, ${managingOrg}. ${sentence}
          <span style="font-size:9px;color:#9a6010;margin-left:6px;font-style:italic;">${f._qualifyReason}</span>
        </div>`;
      }).join('');
      const nqTableRows = buildTableRows(nqFires);
      nqSection = `
        <div class="block" style="border-color:#e8c070;margin-top:4px;">
          <div class="section-head" style="color:#7a4a00;font-size:11px;">
            ⚠ Does Not Meet IMSR Criteria — ${nqFires.length} incident${nqFires.length !== 1 ? 's' : ''}
            <span style="font-weight:normal;color:var(--muted);margin-left:6px;">shown for reference only · excluded from copy</span>
          </div>
          ${nqNarrLines}
          <div class="tbl-outer" style="margin-top:8px;">
            <table class="imsr nq" style="opacity:.75;">
              <thead><tr>${thCells}</tr></thead>
              <tbody>${nqTableRows}</tbody>
            </table>
          </div>
        </div>`;
    }

    const cimtBadge = hasCimtGacc(gacc) ? `<span style="font-size:10px;background:#8b1a1a;color:#fff;border-radius:2px;padding:1px 5px;margin-left:6px;font-weight:600;">CIMT</span>` : '';
    return `
      <div class="gacc-section">
        <div class="gacc-section-head" style="border-color:${color};">
          <span class="gacc-label" style="background:${color};">${gacc}</span>${cimtBadge}
          <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);">${incidents.length} qualifying${missed.length ? ` · ${missed.length} no 209` : ''}${nqFires.length ? ` · ${nqFires.length} non-qualifying` : ''}</span>
        </div>
        <div class="block">
          <div class="section-head">
            Narrative Lines — ${gacc}
            <button class="copy-btn narr" onclick="copyNarrFromBlock(this)">Copy Narratives</button>
          </div>
          ${sortPanel}
          ${lrSortPanel}
          ${narrLines}
        </div>
        <div class="block">
          <div class="section-head">
            Table Rows — ${gacc}
            <button class="copy-btn" onclick="copyRowsFromBlock(this)">Copy Rows</button>
          </div>
          <div class="tbl-outer">
            <table class="imsr">
              <thead><tr>${thCells}</tr></thead>
              <tbody>${tableRows}</tbody>
            </table>
          </div>
        </div>
        ${nqSection}
        ${renderUnitLegend(buildUnitLegend(incidents))}
      </div>
    `;
  }).join('');

  // Non-qualifying fires are now rendered at the bottom of each GACC section
  const nqHtml = '';

  outputEl.style.display = 'block';
  outputEl.innerHTML = `
    <div class="summary">
      <strong>${qualifying.length}</strong> qualifying · <strong>${nonQualifying.length}</strong> non-qualifying across <strong>${gaccKeys.length}</strong> GACC${gaccKeys.length !== 1 ? 's' : ''}${deletedFires.size ? ` · <span style="color:#c0392b;font-weight:600;">${deletedFires.size} deleted</span>` : ''}
      <span style="float:right;">
        <button class="copy-btn narr" onclick="copyAllNarr(this)" style="margin-right:6px;">Copy All Narratives</button>
        <button class="copy-btn" onclick="copyAllRows(this)" style="margin-right:6px;">Copy All Rows</button>
        <button class="copy-btn clear" onclick="clearAll()" style="margin-left:6px;">Clear All</button>

    <div class="narr-controls">
      <label for="narr-filter">Narratives:</label>
      <select id="narr-filter" onchange="applyNarrFilter(this.value)">
        <option value="all"${narrFilterState === 'all' ? ' selected' : ''}>Show all fires</option>
        <option value="hide100"${narrFilterState === 'hide100' ? ' selected' : ''}>Hide 100% contained</option>
      </select>

  `;
  // Reapply narrative filter (persists across re-renders from delete, precip toggle, etc.)
  if (narrFilterState !== 'all') applyNarrFilter(narrFilterState);
}

function buildCopyLine(f) {
  if (!f) return { html: '', plain: '' };
  const { name, parts } = buildNarrativeLine(f);
  const sentence = capitalizeSentences(parts.join('. ') + (parts.length ? '.' : ''));
  const org = (lookupUnit(f.unit) || fv(f.unit) || '').replace(/\s*\([A-Z]{2}\)$/,'') || '[MANAGING ORG]';
  const cimtLabel = f.hasNIMO ? '. NIMO (___)' : f.hasCIMT ? '. CIMT (___)' : '';
  const precip = f._precipConfirmed ? ' Precipitation occurred over the fire area yesterday.' : '';
  const prev = prevMatch(f);
  const isNew = !prev;
  const asterisk = isNew ? '* ' : '';
  // NARR-46 statement order: ...ART. sage-grouse. reduction. precip. last report.
  const LAST_RPT  = 'Last report unless significant activity occurs.';
  const SAGE_GRSE = 'Sage-grouse habitat threatened.';
  let body = sentence;

  if (precip) {
    // Insert precip before "Last report" (which is always last when present)
    if (body.endsWith(LAST_RPT)) {
      body = body.slice(0, -LAST_RPT.length).trimEnd() + ' ' + precip.trim() + ' ' + LAST_RPT;
    } else {
      // No last report — precip goes at the end
      body = body.trimEnd().replace(/\.?$/, '') + '. ' + precip.trim();
    }
  }
  const tail = `, ${org}${cimtLabel}. ${body}`;
  const plain = `${asterisk}${name}${tail}`;
  // Bold only the asterisk+name; rest is normal weight
  const boldPart = asterisk ? `<b>* ${name}</b>` : `<b>${name}</b>`;
  const html = `<span style="font-family:Arial,sans-serif;font-size:11pt;">${boldPart}<span style="font-weight:normal;">${tail.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span></span>`;
  return { html, plain };
}

function deleteSingleFire(incNum, missedKey) {
  if (incNum) {
    const f = allIncidents.find(i => i.f2 === incNum);
    if (f) deletedFires.add(normKey(f.f1, f.unit));
  }
  if (missedKey) {
    deletedFires.add(missedKey);
  }
  renderOutput();
}

function copyAllNarr(btn) {
  // Collect all visible narrative lines
  const targets = Array.from(document.querySelectorAll('.gacc-section .narr-line:not(.hidden-100)'));
  const lines = [];
  targets.forEach(div => {
    if (div.dataset.inc) {
      const f = allIncidents.find(i => i.f2 === div.dataset.inc);
      if (f) lines.push(buildCopyLine(f));
    } else if (div.dataset.missed) {
      const bEl = div.querySelector('b');
      const name = bEl ? bEl.textContent.trim() : '';
      const clone = div.cloneNode(true);
      clone.querySelectorAll('button, .last-rpt-badge, .ret100-badge, .discrep-badge').forEach(el => el.remove());
      const fullText = clone.textContent.trim();
      const rest = name && fullText.startsWith(name) ? fullText.slice(name.length) : fullText;
      const plain  = name + rest;
      const boldPart = name ? `<b>${name}</b>` : '';
      const html = `<span style="font-family:Arial,sans-serif;font-size:11pt;">${boldPart}${rest.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`;
      lines.push({ html, plain });
    }
  });
  copyNarrLines(lines, btn, 'Copy All Narratives');
}

function copyAllRows(btn) {
  const lines = [];
  document.querySelectorAll('.gacc-section tbody tr').forEach(row => {
    const cols = Array.from(row.querySelectorAll('td')).map(td => {
      const inp = td.querySelector('input');
      if ('copyval' in td.dataset) {
        const stored = td.dataset.copyval;
        const typed  = inp ? inp.value.trim() : '';
        // Empty stored = user-editable cell: prefer what they typed, else '---'
        if (stored === '') return typed || '---';
        // Non-empty stored = pre-filled or calculated: use stored value
        return stored;
      }
      return (inp ? (inp.value || '---') : td.textContent).trim().replace(/\s+/g, ' ');
    });
    lines.push(cols.join('\t'));
  });
  copyPlainText(lines.join('\n'), btn, 'Copy All Rows');
}

function copyRowsFromBlock(btn) {

function copyPlainText(text, btn, resetLabel) {
  // Write only text/plain to clipboard — prevents Word from picking up
  // the HTML flavor and applying bold/formatting from the source DOM.
  _btnCopy = true;
  const done = (ok) => {
    _btnCopy = false;
    btn.textContent = ok ? '✓ Copied!' : '✗ Copy failed';
    setTimeout(() => btn.textContent = resetLabel, 2000);
  };
  try {
    const item = new ClipboardItem({
      'text/plain': new Blob([text], { type: 'text/plain' })
    });
    navigator.clipboard.write([item]).then(() => done(true)).catch(() => {
      navigator.clipboard.writeText(text).then(() => done(true)).catch(() => done(false));
    });
  } catch(e) {
    navigator.clipboard.writeText(text).then(() => done(true)).catch(() => done(false));
  }
}

function togglePrecip(pill, incNum) {
  const f = allIncidents.find(i => i.f2 === incNum);
  if (!f) return;
  f._precipConfirmed = !f._precipConfirmed;

  const line = pill.closest('.narr-line');
  if (!line) return;

  const { name, parts } = buildNarrativeLine(f);
  const PRECIP_STMT = 'Precipitation occurred over the fire area yesterday.';
  const LAST_RPT   = 'Last report unless significant activity occurs.';

  // Build the visible sentence, inserting precip per NARR-46 order (before last report)
  let sentence = capitalizeSentences(parts.join('. ') + (parts.length ? '.' : ''));
  if (f._precipConfirmed) {
    if (sentence.endsWith(LAST_RPT)) {
      sentence = sentence.slice(0, -LAST_RPT.length).trimEnd() + ' ' + PRECIP_STMT + ' ' + LAST_RPT;
    } else {
      sentence = sentence.trimEnd().replace(/\.?$/, '') + '. ' + PRECIP_STMT;
    }
  }

  const prev      = prevMatch(f);
  const asterisk  = prev ? '' : '* ';
  const managingOrg = (lookupUnit(f.unit) || fv(f.unit) || '').replace(/\s*\([A-Z]{2}\)$/,'') || '[MANAGING ORG]';
  const cimtLabel = f.hasNIMO ? '. NIMO (___)' : f.hasCIMT ? '. CIMT (___)' : '';
  const pillHtml  = f._precipConfirmed
    ? `<span class="precip-flag confirmed" title="Click to remove precip statement" onclick="togglePrecip(this,'${incNum}')">🌧 Precip added</span>`
    : `<span class="precip-flag" title="Definitive precipitation detected in boxes 35/40/47" onclick="togglePrecip(this,'${incNum}')">🌧 Add precip statement</span>`;

  const delBtn = `<button class="narr-del" title="Remove this fire" onclick="deleteSingleFire('${incNum}','')">✕</button>`;
  line.innerHTML = `<b>${asterisk}${name}</b>, ${managingOrg}${cimtLabel}. ${sentence}${pillHtml}${delBtn}`;
}

// Copy narrative lines with mixed bold formatting for Word
// Uses contenteditable + execCommand — synchronous, no clipboard-write permission needed,
// works reliably on repeated clicks even after tabbing away to Word.
function buildNarrHtml(lines) {
  // Use real empty <p> spacers between narratives — Word ignores CSS margin-bottom on paste,
  // but cannot collapse an actual empty paragraph node.
  const NARR  = `font-family:Arial,sans-serif;font-size:11pt;line-height:1.15;margin:0;padding:0;`;
  const SPACE = `font-family:Arial,sans-serif;font-size:11pt;line-height:1.0;margin:0;padding:0;`;
  return lines.map((l, i) => {
    const p = `<p style="${NARR}">${l.html}</p>`;
    const spacer = i < lines.length - 1 ? `<p style="${SPACE}"><span style="font-size:11pt;">&nbsp;</span></p>` : '';
    return p + spacer;
  }).join('');
}

function copyNarrLines(lines, btn, resetLabel) {
  const htmlContent = buildNarrHtml(lines);

  // Create off-screen contenteditable, select it, execCommand copy
  const el = document.createElement('div');
  el.setAttribute('contenteditable', 'true');
  el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none;white-space:normal;';
  el.innerHTML = htmlContent;
  document.body.appendChild(el);

  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  let ok = false;
  _btnCopy = true;
  try { ok = document.execCommand('copy'); } catch(e) {}
  _btnCopy = false;

  sel.removeAllRanges();
  document.body.removeChild(el);

  btn.textContent = ok ? '✓ Copied!' : '✗ Copy failed — use Ctrl+C';
  setTimeout(() => { btn.textContent = resetLabel; }, 2000);
}

function applyNarrFilter(val) {
  narrFilterState = val;
  document.querySelectorAll('.narr-line[data-pct]').forEach(el => {
    const pct = parseInt(el.dataset.pct) || 0;
    if (val === 'hide100' && pct >= 100) {
      el.classList.add('hidden-100');
    } else {
      el.classList.remove('hidden-100');
    }
  });
}

// ── UNIT LEGEND ──────────────────────────────────────────────────────────

function buildUnitLegend(incidents) {

  // "Explained" = units on active fires — already named in narrative lines, skip in legend.
  const explained = new Set();
  incidents.forEach(f => { if (!is100(f)) explained.add(f.unit); });

  // Walk table rows in order; collect finaled fires whose unit isn't explained above.
  const seen = new Set();
  const entries = [];
  incidents.forEach(f => {
    if (!is100(f)) return;              // active fire — has narrative line
    if (explained.has(f.unit)) return;  // unit already named in a narrative
    if (seen.has(f.unit)) return;       // duplicate unit in legend
    seen.add(f.unit);
    const shortCode = f.unit.includes('-') ? f.unit.slice(f.unit.indexOf('-') + 1) : f.unit;
    const fullName  = UNIT_LOOKUP[f.unit] || '';
    if (shortCode && fullName) entries.push({ shortCode, fullName });
  });
  return entries;
}

function renderUnitLegend(entries) {
  if (!entries.length) return '';
  const uid   = 'leg_' + Math.random().toString(36).slice(2);
  const plain = entries.map(e => e.shortCode + ' – ' + e.fullName).join('     ');
  const html  = entries.map(e =>
    `<span style="font-weight:normal;">${e.shortCode} – ${e.fullName}</span>`
  ).join('<span style="white-space:pre;">     </span>');
  return `<div class="unit-legend" id="${uid}" data-plain="${plain.replace(/"/g, '&quot;')}">
    <button class="legend-copy" onclick="copyLegend('${uid}')">Copy</button>
    ${html}
  </div>`;
}

function copyLegend(uid) {
  const el   = document.getElementById(uid);
  const btn  = el.querySelector('.legend-copy');
  const plain = el.dataset.plain;
  copyPlainText(plain, btn, 'Copy');
}

// ── NIFC AUTO-FETCH ──────────────────────────────────────────────────────

async function fetchFromNIFC() {
  const btn = document.getElementById('nifc-fetch-btn');
  if (btn) { btn.textContent = 'Fetching…'; btn.disabled = true; }
  setIMSRStatus('Fetching from nifc.gov…');
  try {
    // Try direct fetch — works only if CORS allows it from this origin
    const resp = await fetch('https://www.nifc.gov/nicc-files/sitreprt.pdf');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const buf = await resp.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const pages = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const ct   = await page.getTextContent();
      pages.push(ct.items.map(x => x.str).join(' '));
    }
    prevIMSR = parseIMSR(pages.join('\n'));
    setIMSRStatus(`✓ ${prevIMSR.size} incidents loaded from nifc.gov`, 'ok');
    if (allIncidents.length) renderOutput();
  } catch(e) {
    setIMSRStatus('CORS blocked — drop the IMSR PDF instead (nifc.gov does not allow direct fetch from local files)', 'err');
  } finally {
    if (btn) { btn.textContent = 'Fetch from NIFC'; btn.disabled = false; }
  }
}

// ── MISSED FIRES ─────────────────────────────────────────────────────────

// Build narr lines for missed fires (no 209 received) — inline in main narrative block
function buildMissedNarrLines(missed) {
  return missed.map(p => {
    const name = normalizeName(p.name || '');
    const unit = (p.unit || '').replace(/-\d+$/, '');
    const org  = (lookupUnit(p.unit) || unit || '').replace(/\s*\([A-Z]{2}\)$/, '') || '[MANAGING ORG]';
    const prevNarr = (p.narrative || '').trim();
    const suffix = p.missCount >= 2
      ? 'No new information. Last report unless new information is received.'
      : 'No new information.';
    const tail = prevNarr ? `${prevNarr}. ${suffix}` : suffix;
    const mKey = normKey(p.name, p.unit);
    const lastRptBadge = p.wasLastReport ? '<span class="last-rpt-badge" title="Previous IMSR contained a last-report statement.">LAST RPT</span>' : '';
    const lastRptClass = p.wasLastReport ? ' last-rpt' : '';
    const delBtn = `<button class="narr-del" title="Remove this fire" onclick="deleteSingleFire('','${mKey}')">✕</button>`;
    return `<div class="narr-line${lastRptClass}" style="border-left-color:${p.wasLastReport ? '#d35400' : '#9090c0'};opacity:.8;" data-missed="1" data-missed-key="${mKey}">
      <b>${name}</b>${lastRptBadge}, ${org}. ${tail}${delBtn}
    </div>`;
  }).join('<div class="narr-spacer"><br></div>');
}

// Build table rows for missed fires
function buildMissedTableRows(missed) {
  return missed.map(p => {
    const name = normalizeName(p.name || '');
    const unit = (p.unit || '').replace(/-\d+$/, '');
    const mKey = normKey(p.name, p.unit);

    // Est carry-over logic:
    // 100% contained → "---" (TBL-07)
    // Date passed AND <100% → "UNK"
    // Otherwise → carry over from prev IMSR
    let estVal = p.est || '---';
    if (p.pct >= 100) {
      estVal = '---';
    } else {
      const dm = (estVal || '').match(/^(\d{1,2})\/(\d{1,2})$/);
      if (dm) {
        const now = new Date();
        const candidate = new Date(now.getFullYear(), parseInt(dm[1]) - 1, parseInt(dm[2]));
        if (candidate < now && (now - candidate) < 180 * 86400000) {
          estVal = 'UNK';
        }
      }
    }

    const cols = [
      name, unit,
      p.acres ? p.acres.toLocaleString() : '---',
      '---', String(p.pct), 'Ctn', estVal,
      String(p.ppl), '---',
      String(p.crw || 0), String(p.eng || 0), String(p.heli || 0),
      String(p.strc || 0), p.cost || 'NR', p.origin || '---'
    ];
    const tds = COLS.map((c, i) => `<td>${cols[i] || '---'}</td>`).join('');
    return `<tr style="opacity:.7;" data-missed-key="${mKey}">${tds}</tr>`;
  }).join('');
}

function copyMissedNarr(btn) {
  const block = btn.closest('.block');
  const lines = Array.from(block.querySelectorAll('.narr-line[data-missed]')).map(div => {
    const bEl = div.querySelector('b');
    const name = bEl ? bEl.textContent.trim() : '';
    const clone = div.cloneNode(true);
    clone.querySelectorAll('button, .last-rpt-badge, .ret100-badge, .discrep-badge').forEach(el => el.remove());
    const fullText = clone.textContent.trim();
    const rest = name && fullText.startsWith(name) ? fullText.slice(name.length) : fullText;
    const plain  = name + rest;
    const boldPart = name ? `<b>${name}</b>` : '';
    const html = `<span style="font-family:Arial,sans-serif;font-size:11pt;">${boldPart}${rest.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`;
    return { html, plain };
  });
  copyNarrLines(lines, btn, 'Copy Narratives');
}

// ── IMSR COMPARISON ─────────────────────────────────────────────────────

// Normalize a fire name for matching: lowercase, trim, strip common suffixes, collapse spaces
function normKey(name, unit) {
  const n = (name || '').toLowerCase().trim()
    .replace(/\s*\(\d+\)\s*/g, ' ')      // strip parenthetical numbers e.g. "(26)"
    .replace(/\bfire\b/g, '').replace(/\brd\b/g, 'road')
    .replace(/[^a-z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim();
  return n + '|' + (unit || '').toUpperCase().replace(/-\d+$/, '');
}

// Parse the previous IMSR PDF text into a Map of normKey → {name, unit, acres, ppl, pct, narrative, missCount}
function parseIMSR(text) {
  // Normalize Word smart quotes to straight — Word always converts ' to ' (U+2019)
  // which breaks regex character classes that only include ' (U+0027).
  text = text.replace(/[\u2018\u2019]/g, "'").replace(/[\u201C\u201D]/g, '"');
  const map = new Map();

  // ── Step 1: extract narrative lines ──────────────────────────────────
  // PDF.js produces space-joined text per page — no newlines within a page.
  // Match * Name, Org. Narrative... up to the next * fire or 'Incident Name'.
  const NARR_RE = /\*\s+([A-Z0-9][A-Za-z0-9'\-\.\/& ]{0,50}?),\s+([A-Z][^.]{5,100}?)\.\s+((?:(?!\*\s+[A-Z0-9]|Incident Name).)+?)(?=\s*\*\s+[A-Z0-9]|\s*Incident Name|$)/gs;
  const narrativeMap = new Map();
  let nm;
  while ((nm = NARR_RE.exec(text)) !== null) {
    const rawName = nm[1].trim();
    if (rawName.length < 2 || /^(?:Incident|Fire Activity|New fires|Understanding|This report)/i.test(rawName)) continue;
    const fullNarr = nm[3].replace(/\s+/g, ' ').trim();
    const missCount = /last (?:narrative )?report unless new information/i.test(fullNarr) ? 3
      : /no new information/i.test(fullNarr) ? 2 : 1;
    // Strip: fall-off statements, kick-off statement, behavior terms and everything after
    const stripped = fullNarr
      .replace(/\.?\s*No new information\.?\s*/gi, '')
      .replace(/\.?\s*Last (narrative )?report unless new information is received\.?\s*/gi, '')
      .replace(/\.?\s*Last report unless significant activity occurs\.?\s*/gi, '')
      .replace(/\.?\s*(Very Active|Extreme|Active|Moderate|Minimal|Low)\s+fire behavior[\s\S]*/i, '')
      .trim();
    const normName = rawName.toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
    narrativeMap.set(normName, { narrative: stripped, fullNarr, missCount });
  }

  // ── Step 2: parse table rows ──────────────────────────────────────────
  const OWN = String.raw`(?:ST|FS|BIA|NPS|FWS|CNTY|DOW|PRI|BLM|TRI|USFS|Own)\b`;
  const ROW_RE = new RegExp(
    String.raw`(?:^|` + OWN + String.raw`)\s+` +
    String.raw`(\*\s+)?` +
    String.raw`([A-Z0-9][A-Za-z0-9'\-\.\/&\u2013  ]{0,50}?)` +
    String.raw`\s+([A-Z]{2}-[A-Z0-9]+)\s+` +
    String.raw`([\d,]+)\s+` +
    String.raw`(-?[\d,]+|--+)\s+` +
    String.raw`(\d+)\s+` +
    String.raw`(?:Ctn|Comp)\s+` +
    String.raw`([\d\/]+|--+|UNK)\s+` +
    String.raw`(\d+)`,
    'g'
  );

  // Tail columns after PPL: chgePpl, crw, eng, heli, strc, cost, origin
  const TAIL_RE = /^\s*(-?\d+|--+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+([\d.]+[KMB]|NR|\d+)\s+(ST|FS|BIA|NPS|FWS|CNTY|DOW|PRI|BLM|TRI)\b/i;

  let m;
  while ((m = ROW_RE.exec(text)) !== null) {
    const name  = m[2].trim();
    const unit  = m[3];
    const acres = parseInt(m[4].replace(/,/g, '')) || 0;
    const pct   = parseInt(m[6]) || 0;
    const ppl   = parseInt(m[8]) || 0;

    if (name.length < 2) continue;
    if (/^(?:Incident|GACC|Fire Activity|New fires|Uncontained)/i.test(name)) continue;

    // Extract tail columns from text after PPL match
    const tailText = text.substring(m.index + m[0].length);
    const tail = TAIL_RE.exec(tailText);
    const crw    = tail ? parseInt(tail[2]) || 0 : 0;
    const eng    = tail ? parseInt(tail[3]) || 0 : 0;
    const heli   = tail ? parseInt(tail[4]) || 0 : 0;
    const strc   = tail ? parseInt(tail[5]) || 0 : 0;
    const cost   = tail ? tail[6] : 'NR';
    const origin = tail ? tail[7].toUpperCase() : '';

    // Find matching narrative by name — check asterisked narratives first
    const normName = name.toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
    let narrEntry = narrativeMap.get(normName) || null;

    // Step 1b: If no asterisked narrative found, search for non-asterisked narrative.
    // Use the known fire name as anchor in the IMSR text, grab content until the next
    // known fire name or section boundary. Simpler than regex — uses text positions.
    if (!narrEntry) {
      const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      // Find the fire name in the narrative section (not in table rows)
      // Look for "Name," pattern — the comma after the name distinguishes narrative from table
      const nameRe = new RegExp(escaped + '\\s*,\\s+', 'gi');
      let nameMatch;
      let bestMatch = null;
      while ((nameMatch = nameRe.exec(text)) !== null) {
        // Skip if this looks like it's inside a table row (preceded by unit code pattern)
        const before = text.slice(Math.max(0, nameMatch.index - 30), nameMatch.index);
        if (/[A-Z]{2}-[A-Z]{2,}\s+[\d,]+\s*$/.test(before)) continue;
        // Skip if preceded by "* " (that's an asterisked fire, already captured in Step 1)
        if (/\*\s+$/.test(before)) continue;
        bestMatch = nameMatch;
        break;
      }
      if (bestMatch) {
        // Grab text from after "Name, " up to 600 chars
        const startPos = bestMatch.index + bestMatch[0].length;
        const chunk = text.slice(startPos, startPos + 600);
        // Find org text: everything up to first period
        const orgEnd = chunk.indexOf('.');
        if (orgEnd > 0 && orgEnd < 150) {
          const afterOrg = chunk.slice(orgEnd + 1).trim();
          // Grab narrative until next fire boundary: asterisk, "Incident Name", or end
          // Use a simple scan — stop at patterns that look like another fire's narrative start
          let narrText = afterOrg;
          // Truncate at next "FireName, OrgText." boundary or table section
          const stopPatterns = [/\bIncident Name\b/i, /\bTABLE ROWS\b/i, /\b[A-Z]{2}-[A-Z]{2,}\s+[\d,]+\s/];
          for (const sp of stopPatterns) {
            const sm = sp.exec(narrText);
            if (sm) narrText = narrText.slice(0, sm.index).trim();
          }
          if (narrText.length > 5) {
            const fullNarr = narrText.replace(/\s+/g, ' ').trim();
            const missCount = /last (?:narrative )?report unless new information/i.test(fullNarr) ? 3
              : /no new information/i.test(fullNarr) ? 2 : 1;
            const stripped = fullNarr
              .replace(/\.?\s*No new information\.?\s*/gi, '')
              .replace(/\.?\s*Last (narrative )?report unless new information is received\.?\s*/gi, '')
              .replace(/\.?\s*Last report unless significant activity occurs\.?\s*/gi, '')
              .replace(/\.?\s*(Very Active|Extreme|Active|Moderate|Minimal|Low)\s+fire behavior[\s\S]*/i, '')
              .trim();
            narrEntry = { narrative: stripped, fullNarr, missCount };
            narrativeMap.set(normName, narrEntry);
          } else {
          }
        } else {
        }
      } else {
      }
    }
    if (!narrEntry) narrEntry = { narrative: '', fullNarr: '', missCount: 1 };

    const est = m[7];  // Est from prev IMSR table: M/DD, ---, or UNK

    const key = normKey(name, unit);
    if (!map.has(key)) {
      map.set(key, { name, unit, acres, ppl, pct, est,
        crw, eng, heli, strc, cost, origin,
        narrative:  narrEntry.narrative,
        fullNarr:   narrEntry.fullNarr,
        missCount:  narrEntry.missCount,
        wasLastReport: false });
    }
  }

  // ── Step 2b: fix over-captured narratives ──────────────────────────────
  // NARR_RE (Step 1) only stops at asterisked fires. If a non-asterisked
  // fire sits between two asterisked fires, its narrative text gets
  // swallowed into the preceding fire's capture. Now that we have all
  // fire names from Step 2, truncate any narrative that bleeds into
  // another fire's "Name, OrgText." pattern.
  const allNames = [...map.values()].map(e => e.name);
  for (const [key, entry] of map) {
    if (!entry.fullNarr) continue;
    // Build regex: look for another fire's name followed by ", CapitalWord"
    for (const otherName of allNames) {
      if (otherName === entry.name) continue;
      const esc = otherName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const cutRe = new RegExp('\\b' + esc + '\\s*,\\s+[A-Z]', 'i');
      const cutM = cutRe.exec(entry.fullNarr);
      if (cutM) {
        // Truncate at the bleed point, strip trailing asterisks/whitespace
        const truncated = entry.fullNarr.slice(0, cutM.index).replace(/[\s*]+$/, '').trim();
        entry.fullNarr = truncated;
        // Re-evaluate missCount and stripped narrative from clean text
        entry.missCount = /last (?:narrative )?report unless new information/i.test(truncated) ? 3
          : /no new information/i.test(truncated) ? 2 : 1;
        entry.narrative = truncated
          .replace(/\.?\s*No new information\.?\s*/gi, '')
          .replace(/\.?\s*Last (narrative )?report unless new information is received\.?\s*/gi, '')
          .replace(/\.?\s*Last report unless significant activity occurs\.?\s*/gi, '')
          .replace(/\.?\s*(Very Active|Extreme|Active|Moderate|Minimal|Low)\s+fire behavior[\s\S]*/i, '')
          .trim();
        // Also update narrativeMap so Step 3 uses corrected text
        const normName = entry.name.toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
        narrativeMap.set(normName, { narrative: entry.narrative, fullNarr: entry.fullNarr, missCount: entry.missCount });
        break;  // only need to find the first bleed
      }
    }
  }

  // ── Step 3: flag fires whose prev narrative had "Last report" ──────
  // Check each entry's own fullNarr (already truncated at fire boundaries
  // by Steps 1/2a/2b) — no raw-text vicinity scan needed.
  // Catch all variants: "Last report unless significant activity occurs",
  // "Last narrative report unless new information is received",
  // "Last report unless new information is received".
  for (const [key, entry] of map) {
    if (entry.fullNarr && /last (?:narrative )?report unless/i.test(entry.fullNarr)) {
      entry.wasLastReport = true;
    }
  }
  return map;
}

// Look up a today-incident in the previous IMSR
function prevMatch(f) {
  if (!prevIMSR) return null;
  // Try exact normKey first, then unit-only fallback
  const key = normKey(f.f1, f.unit);
  if (prevIMSR.has(key)) return prevIMSR.get(key);
  // Fuzzy: same unit, name starts with same first word
  const firstWord = (f.f1 || '').toLowerCase().split(/\s+/)[0];
  for (const [k, v] of prevIMSR) {
    if (v.unit.replace(/-\d+$/,'') === (f.unit||'').replace(/-\d+$/,'') &&
        v.name.toLowerCase().startsWith(firstWord) && firstWord.length > 2) {
      return v;
    }
  }
  return null;
}

// Intercept Ctrl+C — if any narr-lines are selected, override clipboard
// with properly spaced HTML so Word paste looks the same as button copy.
// Copy event listener removed — highlight + Ctrl+C now works natively.
// Use the Copy buttons for Word-formatted output with bold fire names.

function clearAll() {
  allIncidents = [];
  deletedFires.clear();
  lastRptLabelOff.clear();
  lastRptForceActive.clear();
  narrFilterState = 'all';
  fileListEl.innerHTML = '';
  outputEl.style.display = 'none';
  outputEl.innerHTML = '';
  statusEl.style.display = 'none';
}

function clearIMSR() {
  prevIMSR = null;
  imsrStatusEl.style.display = 'none';
  if (allIncidents.length) renderOutput();
}
