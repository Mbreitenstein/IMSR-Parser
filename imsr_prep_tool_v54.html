<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMSR Prep Tool v57</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  :root {
    --bg: #f5f4f1; --surface: #ffffff; --border: #d4d0c8;
    --accent: #b84a00; --accent2: #1a5c96; --text: #1a1a1a;
    --muted: #7a7670; --label: #4a4640; --good: #1a6b3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; padding: 24px; }

  header { margin-bottom: 24px; border-bottom: 2px solid var(--accent); padding-bottom: 12px; }
  header h1 { font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: .08em; }
  header p { font-size: 12px; color: var(--muted); margin-top: 3px; }

  .drop-zone {
    border: 2px dashed var(--border); border-radius: 4px; padding: 32px 24px;
    text-align: center; cursor: pointer; background: var(--surface);
    transition: border-color .2s, background .2s; margin-bottom: 8px;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: #fff8f5; }
  .drop-zone p { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .drop-zones { display: flex; gap: 12px; margin-bottom: 8px; }
  .drop-zones .drop-zone { flex: 1; margin-bottom: 0; }
  .drop-zone.imsr-zone { border-color: var(--accent2); }
  .drop-zone.imsr-zone:hover, .drop-zone.imsr-zone.drag-over { border-color: var(--accent2); background: #f0f7ff; }
  .drop-zone.imsr-zone button { background: var(--accent2); }
  .imsr-status { font-family: 'IBM Plex Mono', monospace; font-size: 11px; margin-bottom: 4px; padding: 4px 10px; border-radius: 3px; display: none; }
  .imsr-status.ok  { color: var(--good); background: #f0fff4; display: block; }
  .imsr-status.err { color: var(--accent); background: #fff5f0; display: block; }
  .imsr-status.loading { color: var(--muted); background: #f5f4f1; display: block; }
  .missed-fire .narr-line { border-left-color: #9090c0; }
  .unit-legend { font-family: Arial, sans-serif; font-size: 9pt; color: var(--text); padding: 6px 8px; background: #faf9f7; border: 1px solid var(--border); border-top: none; border-radius: 0 0 3px 3px; margin-bottom: 16px; line-height: 1.8; }
  .unit-legend .legend-copy { float: right; font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; background: var(--muted); color: #fff; border: none; padding: 3px 10px; border-radius: 2px; cursor: pointer; margin-top: -2px; }
  .unit-legend .legend-copy:hover { opacity: .85; }

  .drop-zone button {
    background: var(--accent); color: #fff; border: none; padding: 8px 20px;
    border-radius: 3px; font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    font-weight: 600; cursor: pointer; letter-spacing: .04em;
  }
  #file-input { display: none; }

  .file-list { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 16px; min-height: 18px; }
  .file-list span { display: inline-block; background: #e8e4dc; border-radius: 2px; padding: 2px 7px; margin: 2px 3px 2px 0; color: var(--label); }

  .status { font-family: 'IBM Plex Mono', monospace; font-size: 11px; margin-bottom: 16px; display: none; padding: 6px 10px; border-radius: 3px; }
  .status.ok { color: var(--good); background: #f0fff4; display: block; }
  .status.err { color: var(--accent); background: #fff5f0; display: block; }
  .status.loading { color: var(--muted); background: #f5f4f1; display: block; }

  .output { display: none; }

  .section-head {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600;
    letter-spacing: .12em; text-transform: uppercase; color: var(--label);
    border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }

  .block { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 16px; margin-bottom: 16px; }

  /* Narratives */
  .narr-line {
    font-size: 13px; line-height: 1.85; color: var(--text);
    border-left: 3px solid var(--accent); padding: 4px 0 4px 14px;
    margin-bottom: 10px; word-break: break-word; cursor: text;
    border-radius: 0 3px 3px 0; transition: background .1s;
  }
  .narr-line:last-of-type { margin-bottom: 0; }
  .narr-line:hover { background: #faf8f5; }
  .narr-line.selected { background: #edf7ed; border-left-color: var(--good); outline: 1px solid #b8ddb8; }
  .narr-del { float: right; background: none; border: 1px solid var(--border); border-radius: 3px; color: var(--muted); font-size: 10px; line-height: 14px; padding: 0 4px; cursor: pointer; margin-left: 6px; margin-top: 2px; -webkit-user-select: none; user-select: none; }
  .narr-line:hover .narr-del { color: #c0392b; border-color: #c0392b; }
  .narr-del:hover { opacity: 1 !important; color: #c0392b; border-color: #c0392b; }
  .narr-spacer { font-size: 1px; line-height: 1px; margin: 0; padding: 0; overflow: hidden; }
  .last-rpt-badge { display: inline-block; font-size: 9px; font-weight: 700; color: #fff; background: #d35400; padding: 1px 5px; border-radius: 3px; margin-left: 6px; vertical-align: middle; letter-spacing: 0.3px; cursor: help; -webkit-user-select: none; user-select: none; }
  .narr-line.last-rpt { border-left-color: #d35400; background: #fef5ed; }
  .delete-btn { background: #c0392b; color: #fff; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .delete-btn:hover { background: #a93226; }
  .delete-btn:disabled { background: #ccc; cursor: not-allowed; }
  .blank { background: #fff3cd; color: #7a4a00; border-radius: 2px; padding: 0 4px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }

  /* Table */
  .tbl-outer { overflow-x: auto; margin-bottom: 8px; }
  table.imsr { border-collapse: collapse; font-family: Arial, sans-serif; font-size: 9pt; white-space: nowrap; width: 100%; text-align: center; }
  table.imsr th {
    background: #e8e4dc; color: var(--label); padding: 5px 8px;
    font-size: 8pt; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
    border: 1px solid var(--border); text-align: center; position: sticky; top: 0;
  }
  table.imsr td {
    background: var(--surface); padding: 6px 8px;
    border: 1px solid var(--border); color: var(--text); vertical-align: middle;
    text-align: center;
  }
  table.imsr td:first-child { text-align: left; }
  table.imsr th:first-child { text-align: left; }
  table.imsr tr:nth-child(even) td { background: #faf9f7; }
  table.imsr td.manual { background: #f0f7ff !important; }
  table.imsr tr.ctn100 td { background: #e8f2fd !important; }
  .narr-line.ctn100 { border-left-color: #6a9fd8; background: #e8f2fd; }
  table.imsr tr.returning-100 td { background: #fff8e1 !important; }
  .narr-line.returning-100 { border-left-color: #c8a000; background: #fffbe6; }
  .narr-line.discrep { border-left-color: #c0392b; background: #fdf0ee; }
  .ret100-badge { display: inline-block; font-size: 9px; font-weight: 700; color: #fff; background: #b8960a; padding: 1px 5px; border-radius: 3px; margin-left: 6px; vertical-align: middle; letter-spacing: 0.3px; cursor: help; -webkit-user-select: none; user-select: none; }
  .discrep-badge { display: inline-block; font-size: 9px; font-weight: 700; color: #fff; background: #c0392b; padding: 1px 5px; border-radius: 3px; margin-left: 6px; vertical-align: middle; letter-spacing: 0.3px; cursor: help; -webkit-user-select: none; user-select: none; }
  table.imsr tr.discrep td { outline: 2px solid #c0392b; outline-offset: -2px; }
  table.imsr td.empty { color: var(--text); }
  table.imsr td input {
    background: transparent; border: none; outline: none;
    font-family: Arial, sans-serif; font-size: 9pt;
    color: var(--accent2); width: 56px; padding: 0; text-align: center;
  }
  table.imsr td input::placeholder { color: var(--text); opacity: 1; }

  .copy-btn {
    background: var(--accent2); color: #fff; border: none; padding: 6px 14px;
    border-radius: 3px; font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    font-weight: 600; cursor: pointer; transition: opacity .15s;
  }
  .copy-btn:hover { opacity: .85; }
  .copy-btn.narr { background: var(--accent); }
  .copy-btn.clear { background: var(--muted); margin-left: 8px; }

  .hint { font-size: 11px; color: var(--muted); margin-top: 8px; font-style: italic; }
  .sort-panel { margin-bottom: 8px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .sort-row { display: flex; align-items: center; gap: 6px; padding: 3px 8px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 11px; font-family: 'IBM Plex Mono', monospace; }
  .sort-row:last-child { border-bottom: none; }
  .sort-row.sort-locked { opacity: .5; }
  .sort-row.sort-moved { background: #fff8e8; }
  .sort-name { flex: 1; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sort-pct  { min-width: 30px; text-align: right; color: var(--muted); }
  .sort-btn  { background: none; border: 1px solid var(--border); border-radius: 3px; padding: 0 5px; cursor: pointer; font-size: 10px; color: var(--muted); line-height: 16px; }
  .sort-btn:hover { background: var(--border); color: var(--text); }
  .sort-lock { font-size: 10px; opacity: .5; }
  .summary { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--label); margin-bottom: 14px; }
  .narr-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--label); }
  .narr-controls select { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 3px 8px; border: 1px solid var(--border); border-radius: 3px; background: var(--surface); color: var(--text); cursor: pointer; }
  .narr-line.hidden-100 { display: none; }
  .summary strong { color: var(--accent2); }

  /* Non-qualifying section */
  .nq-divider {
    border: none; border-top: 2px dashed #c8a060;
    margin: 28px 0 20px 0;
  }
  .nq-banner {
    background: #fff8ee; border: 1px solid #e8c070; border-radius: 4px;
    padding: 10px 16px; margin-bottom: 16px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7a4a00;
    display: flex; align-items: center; gap: 10px;
  }
  .nq-banner strong { font-size: 12px; }
  .nq-reason {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: #c87020; background: #fff3dc; border-radius: 2px;
    padding: 1px 6px; margin-left: 6px;
  }
  .narr-line.nq { border-left-color: #c8a060; }
  .precip-flag {
    display: inline-block;
    margin-left: 10px; background: #fffbea; border: 1px solid #e8c840;
    border-radius: 3px; padding: 1px 8px; font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: #7a6000; cursor: pointer; vertical-align: middle;
    user-select: none;
  }
  .precip-flag.confirmed { background: #e8f5e8; border-color: #4a9a4a; color: #1a5c1a; }
  .kickoff-toggle {
    display: inline-block; margin-left: 8px; background: #f0e8f8; border: 1px solid #b090d0;
    border-radius: 3px; padding: 1px 8px; font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: #6a40a0; cursor: pointer; vertical-align: middle; user-select: none;
  }
  .kickoff-toggle:hover { background: #e0d0f0; }
  .kickoff-toggle.toggled { background: #e8f5e8; border-color: #4a9a4a; color: #1a5c1a; }


  table.imsr.nq th { background: #f0e8d0; }
  table.imsr.nq tr:nth-child(even) td { background: #fdf8f0; }

  /* GACC grouping */
  .gacc-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600;
    letter-spacing: .1em; padding: 5px 12px; border-radius: 3px;
    color: #fff; display: inline-block; margin-bottom: 10px;
  }
  .gacc-section { margin-bottom: 28px; }
  .gacc-section-head {
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 2px solid var(--border); padding-bottom: 8px; margin-bottom: 14px;
  }
</style>
</head>
<body>

<header>
  <h1>IMSR PREP TOOL</h1>
  <p>Drop one or more 209 PDFs — sorted by % contained, ready to paste into Word</p>
</header>

<div class="drop-zones">
  <div class="drop-zone" id="drop-zone">
    <p>Drop 209 PDFs here (one or many) or click to select</p>
    <button onclick="document.getElementById('file-input').click()">Select PDFs</button>
    <input type="file" id="file-input" accept=".pdf" multiple>
  </div>
  <div class="drop-zone imsr-zone" id="imsr-drop-zone">
    <p>Drop previous IMSR PDF here for comparison<br><small style="color:var(--muted);">Removes asterisks on returning fires · Calculates Chge in Acres &amp; PPL</small></p>
    <button onclick="document.getElementById('imsr-file-input').click()">Select IMSR PDF</button>
    <button onclick="clearIMSR()" style="margin-left:8px;background:var(--muted);color:#fff;border:none;padding:8px 14px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;">Clear IMSR</button>
    <input type="file" id="imsr-file-input" accept=".pdf" style="display:none">
  </div>
</div>
<div class="file-list" id="file-list"></div>
<div class="imsr-status" id="imsr-status"></div>
<div class="status" id="status"></div>
<div class="output" id="output"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const statusEl  = document.getElementById('status');
const outputEl  = document.getElementById('output');
const fileListEl = document.getElementById('file-list');

// Store all parsed incidents
let allIncidents = [];
// Previous IMSR data for comparison: Map of normKey → {name, unit, acres, ppl, pct}
let prevIMSR = null;
let _btnCopy = false; // bypass copy listener during button-triggered copies
let deletedFires = new Set(); // keys of fires manually removed by user
let lastRptLabelOff = new Set();   // fires with kick-off label suppressed
let lastRptForceActive = new Set(); // fires forced back to active sort
let narrFilterState = 'all'; // persists across re-renders: 'all' or 'hide100'

// Accept PDFs by MIME type OR extension — Windows drag-from-Explorer often sends empty MIME
function isPDF(f) {
  return f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf');
}

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
// IMSR drop zone
const imsrDropZone  = document.getElementById('imsr-drop-zone');
const imsrFileInput = document.getElementById('imsr-file-input');
const imsrStatusEl  = document.getElementById('imsr-status');

imsrDropZone.addEventListener('dragover', e => { e.preventDefault(); imsrDropZone.classList.add('drag-over'); });
imsrDropZone.addEventListener('dragleave', () => imsrDropZone.classList.remove('drag-over'));
imsrDropZone.addEventListener('drop', e => {
  e.preventDefault(); imsrDropZone.classList.remove('drag-over');
  const files = Array.from(e.dataTransfer.files).filter(isPDF);
  if (files.length) handleIMSRFile(files[0]);
});
imsrFileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleIMSRFile(e.target.files[0]);
  e.target.value = '';
});

function setIMSRStatus(msg, type='loading') {
  imsrStatusEl.className = 'imsr-status ' + type;
  imsrStatusEl.textContent = msg;
}

let _lastIMSRRawText = ''; // diagnostic: raw text from last IMSR PDF

async function handleIMSRFile(file) {
  setIMSRStatus('Reading IMSR…');
  try {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const pages = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const ct = await page.getTextContent();
      pages.push(ct.items.map(x => x.str).join(' '));
    }
    const text = pages.join('\n');
    _lastIMSRRawText = text;
    prevIMSR = parseIMSR(text);
    if (prevIMSR.size === 0) {
      imsrStatusEl.className = 'imsr-status ok';
      imsrStatusEl.innerHTML = `✓ 0 incidents loaded from previous IMSR — <a href="#" onclick="showIMSRDiagnostic();return false;" style="color:#2565ae;text-decoration:underline;font-weight:600;">show raw text</a><br><span style="font-size:11px;color:#c0392b;">If you used Export to PDF, try Print to PDF or Save as Adobe PDF instead.</span>`;
    } else {
      setIMSRStatus(`✓ ${prevIMSR.size} incidents loaded from previous IMSR`, 'ok');
    }
    renderOutput();
  } catch(e) {
    setIMSRStatus('Failed to read IMSR PDF — ' + e.message, 'err');
  }
}

function showIMSRDiagnostic() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:6px;padding:16px;max-width:90vw;max-height:85vh;display:flex;flex-direction:column;';
  box.innerHTML = `<div style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;margin-bottom:8px;">
    Raw PDF.js text (${_lastIMSRRawText.length.toLocaleString()} chars) — click outside to close
    <button onclick="navigator.clipboard.writeText(_lastIMSRRawText).then(()=>this.textContent='Copied!')" style="margin-left:12px;font-size:11px;cursor:pointer;">Copy to clipboard</button>
  </div>
  <pre style="overflow:auto;flex:1;font-size:11px;line-height:1.4;white-space:pre-wrap;word-break:break-all;border:1px solid #ccc;padding:10px;background:#f8f8f6;max-height:75vh;">${_lastIMSRRawText.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`;
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  handleFiles(Array.from(e.dataTransfer.files).filter(isPDF));
});
fileInput.addEventListener('change', e => {
  handleFiles(Array.from(e.target.files).filter(isPDF));
  e.target.value = '';
});

function setStatus(msg, type='loading') {
  statusEl.style.display = 'block';
  statusEl.textContent = msg;
  statusEl.className = 'status ' + type;
}

async function handleFiles(files) {
  if (!files.length) return;
  setStatus(`Processing ${files.length} PDF${files.length > 1 ? 's' : ''}...`);

  const INC_NUM_RE = /[A-Z]{2}-[A-Z0-9]+-\d+/;

  for (const file of files) {
    try {
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

      // Extract all pages — space-join within page, newline between pages
      let pages = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        pages.push(content.items.map(x => x.str).join(' '));
      }
      const fullText = pages.join('\n');

      // Split on the ICS-209 page header — matches both form title variants:
      // "Incident Status Summary (ICS-209)" and "Selected Incident Intelligence Summaries (ICS-209)"
      const ICS209_HEADER = /(?=(?:Incident Status Summary|Selected Incident Intelligence Summaries) \(ICS-209\))/i;
      const rawChunks = fullText.split(ICS209_HEADER)
        .map(c => c.trim()).filter(c => c && /ICS-209/i.test(c));

      // Merge chunks belonging to the same incident by incident number.
      // Each chunk is checked for an incident number anywhere in it.
      // Chunks with a NEW incident number start a new group.
      // Chunks with NO incident number (continuation pages, cover pages) fold
      // into the previous group. Orphan chunks before the first incident are discarded.
      const merged = [];
      for (const chunk of rawChunks) {
        const numM = chunk.match(INC_NUM_RE);
        const incNum = numM ? numM[0] : null;
        if (incNum) {
          // Check if this incident number already has an open group
          const existingGroup = merged.find(g => g.incNum === incNum);
          if (existingGroup) {
            existingGroup.text += '\n' + chunk; // continuation page, same incident
          } else {
            merged.push({ incNum, text: chunk }); // new incident
          }
        } else if (merged.length) {
          merged[merged.length - 1].text += '\n' + chunk; // no number = continuation
        }
        // else: orphan before first incident — discard
      }

      // Parse each merged incident chunk
      for (const { text } of merged) {
        const fields = parseFields(text);
        fields._filename = file.name;
        // Dedup by incident number
        const exists = allIncidents.findIndex(inc => inc.f2 && inc.f2 === fields.f2);
        if (exists >= 0) allIncidents[exists] = fields;
        else allIncidents.push(fields);
      }

    } catch(e) {
      console.warn('Failed to parse', file.name, e);
    }
  }

  // Sort by % contained ascending (lowest first), unknowns at bottom
  allIncidents.sort((a, b) => {
    const pa = parseInt(a.f8a) || 0;
    const pb = parseInt(b.f8a) || 0;
    return pa - pb;
  });

  updateFileList();
  renderOutput();
  setStatus(`✓ ${allIncidents.length} incident${allIncidents.length !== 1 ? 's' : ''} loaded — sorted by threat → behavior → % contained`, 'ok');
}

function updateFileList() {
  fileListEl.innerHTML = allIncidents.map(f =>
    `<span>${f.f1 || f._filename}</span>`
  ).join('');
}

// ── PARSERS ───────────────────────────────────────────────────────────────

function detectPrecip(text) {
  if (!text) return false;
  const PRECIP = [
    /\brains?\b/i, /\braining\b/i, /\brainfall\b/i, /\brained\b/i,
    /\bshowers?\b/i,
    /\bsnows?\b/i, /\bsnowed\b/i, /\bsnowing\b/i, /\bsnowfall\b/i,
    /\bhail\b/i,
    /\bprecipitation\b/i, /\bprecip\b/i,
    /\bwetting\b/i, /\bmoisture event\b/i,
    /\binch(?:es)?\s+of\b/i, /\b\d+\.\d+\s*(?:inch|in\.)\b/i,
    /\bthunderstorms?\b/i,
  ];
  const UNCERTAIN = [
    /\bpossible\b/i, /\bpossibly\b/i, /\bchance\b/i, /\bchances\b/i,
    /\bexpected\b/i, /\bforecast\b/i, /\bforecasted\b/i,
    /\bpotential\b/i, /\bpotentially\b/i, /\banticipated\b/i,
    /\btomorrow\b/i, /\btonight\b/i, /\bthis\s+afternoon\b/i,
    /\bthis\s+evening\b/i, /\bthis\s+week\b/i, /\bnext\b/i,
    /\b\d+\s*%\b/i,
    /\bmay\b/,        // lowercase only — do NOT use /i here; "May" (month) must not filter precip
    /\bmight\b/i, /\bcould\b/i,
    // NOTE: removed \bif\b and \bwhen\b — too broad; caused false negatives on sentences like
    // "Rain fell on the fire area, and when crews returned..." or "0.5" fell, if accurate..."
  ];
  const sentences = text.split(/(?<=[.!?])\s+/);
  for (const sent of sentences) {
    if (PRECIP.some(p => p.test(sent)) && !UNCERTAIN.some(u => u.test(sent))) return true;
  }
  return false;
}

// Scan a text block for infrastructure keywords.
// Returns object: { energy, communication, railroad }
//
// DESIGN NOTE: Use compound phrases wherever possible. Single-word terms cause
// false positives from ICS-209 form labels and common narrative words:
//   "infrastructure" → matches printed form label "critical infrastructure and key resources, etc)"
//   "mine"           → substring of "Imminent", "determine", "undermine"
//   "gas","oil","well","transmission","energy" → too common in other contexts
//   "antenna"        → appears in weather discussion sections
function detectInfrastructure(text) {
  const t = text.toLowerCase();

  const energy = [
    // Oil & gas — compound phrases only
    'oil and gas', 'oil well', 'gas well', 'gas pipeline', 'oil pipeline',
    'oil field', 'gas field', 'natural gas facility', 'wellhead', 'tank battery',
    'tank farm', 'drilling operation', 'drill site',
    // Power infrastructure
    'power line', 'power lines', 'power plant', 'power grid',
    'solar farm', 'solar panel', 'solar array', 'wind turbine', 'wind farm',
    'electric substation', 'electrical substation', 'electric transmission line',
    'high-tension line', 'high tension line', 'high voltage line',
    'hydroelectric', 'hydro-electric', 'kilowatt', 'megawatt',
    // Water utility — specific compound phrases only
    'community water system', 'municipal water', 'water treatment plant',
    'water treatment facility', 'irrigation system',
    // Mining — compound to avoid "Imminent", "determine", etc.
    'mining operation', 'mine site', 'coal mine', 'open pit mine',
  ].some(k => t.includes(k));

  const communication = [
    'communication tower', 'communications tower',
    'radio tower', 'cell tower', 'repeater site', 'repeater tower',
    'microwave tower', 'communication site', 'communications site',
    'broadcast tower', 'television tower',
  ].some(k => t.includes(k));

  const railroad = [
    'railroad', 'railway', 'rail line', 'rail corridor',
    'amtrak', 'freight rail',
  ].some(k => t.includes(k));

  return { energy, communication, railroad };
}

function detectSageGrouse(text) {
  return /sage[-\s]?grouse/i.test(text);
}

function grab(text, ...patterns) {
  for (const p of patterns) {
    const m = text.match(p);
    if (m && m[1] && m[1].trim()) return m[1].trim();
  }
  return '';
}

function grabBlock(text, startRe, endRe) {
  const s = text.search(startRe);
  if (s === -1) return '';
  const sm = text.match(startRe);
  let chunk = text.slice(s + (sm ? sm[0].length : 0));
  const e = chunk.search(endRe);
  if (e !== -1) chunk = chunk.slice(0, e);
  return chunk.replace(/Narrative:/gi, '').replace(/Mar \d{1,2}, \d{4}[\s\S]{0,30}?[AP]M/g, '').trim();
}

function formatDate(raw) {
  if (!raw) return '---';
  raw = raw.trim();
  if (/^UNK$/i.test(raw)) return 'UNK';
  let m = raw.match(/^(\d{1,2})\/(\d{1,2})(?:\/\d{2,4})?/);
  if (m) return parseInt(m[1]) + '/' + parseInt(m[2]);
  const months = {january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12};
  m = raw.match(/(\w+)\s+(\d{1,2}),?\s*\d{0,4}/i);
  if (m) { const mon = months[m[1].toLowerCase()]; if (mon) return mon + '/' + parseInt(m[2]); }
  return raw;
}

function parseFields(text) {
  const f = {};

  // Incident name — Layout A: "Incident: FIRENAME 1. Incident Name:..."
  // Layout B (Selected Incident Intelligence Summaries): "1. Incident Name:  2. Incident Number:  FIRENAME  UNIT-NUM"
  const incM = text.match(/Incident:\s*(.+?)(?:\s+1\.\s*Incident Name|\n|$)/);
  f.f1 = incM ? incM[1].trim() : '';
  if (f.f1.length > 60 || /\d\.\s+(Incident|Report|Current)/.test(f.f1)) {
    const short = f.f1.match(/^(.+?)(?:\s+\d\.\s|\s{3,}|$)/);
    f.f1 = short ? short[1].trim() : f.f1.substring(0, 40).trim();
  }
  // Layout B fallback: name appears between "Number:" and the unit code
  if (!f.f1) {
    const incM2 = text.match(/Incident Name:\s*2\.\s*Incident Number:\s*(\S.*?)\s+[A-Z]{2}-[A-Z0-9]+-\d+/i);
    f.f1 = incM2 ? incM2[1].trim() : '';
  }

  f.f2 = grab(text, /([A-Z]{2}-[A-Z0-9]+-\d+)/);
  f.unit = f.f2 ? f.f2.replace(/-\d+$/, '') : '';
  f.originOwn = deriveOwn(f.f2);

  // Acres with comma formatting
  const acM = text.match(/(\d[\d,]*\.?\d*)\s*Acres?/i);
  if (acM) {
    const n = parseInt(acM[1].replace(/,/g, ''));
    f.f7 = n.toLocaleString();
  } else f.f7 = '';

  f.f8a = grab(text,
    // Standard layout: "Contained or Completed: 90 %"
    /Contained or\s+Completed:\s*(\d+)\s*%/i,
    // Partial match when columns scramble the label
    /Completed:\s*[^\d]{0,40}?(\d+)\s*%/i,
    // PDF.js column-scramble fallback: "90 % Human" or "90 % Lightning" etc.
    // % containment appears before the cause field; exclude "100 % Full Suppression" row
    /(\d+)\s*%\s+(?:Human|Lightning|Unknown|Undetermined|Natural|Unplanned)/i
  );

  f.f21 = grab(text, /21\.\s*Incident Location Ownership[\s\S]{0,80}?jurisdiction\)?:?\s*([^\n\s][^\n\s]{0,40})(?:\s+22\.)?/i);
  f.f25 = grab(text, /25\.\s*Short Location[\s\S]{0,100}?point\)?:?\s*([^\n]+?)(?=\s*26\.|$)/i);

  // PDF.js joins all text items with spaces — no newlines within a page.
  // Pages are joined with \n. The page stamp appears inline, e.g.:
  // "Extreme Wind Driven Runs Mar 10, 2026 1 7:24AM\nIncident Status Summary (ICS-209)\nIncident: Porcupine Creek Running"
  // We must handle space-joined behavior terms and strip the page-break header.

  // F28: store raw grabBlock output — cleanBehavior handles all parsing via exact matching
  // Page header stripping ("Incident Status Summary...Incident: NAME") is handled
  // inside cleanBehavior using a lookahead, covering both newline and space-joined text.
  const f28raw = grabBlock(text,
    /28\.\s*Observed Fire Behavior[\s\S]{0,200}?causal agents\)?:\s*/i,
    /Narrative:|29\./i
  );
  f.f28 = f28raw;

  // F29: grab raw fuel content. Use increasing-permissiveness fallbacks since
  // PDF.js text stream ordering varies by PDF generator.
  let f29raw = grabBlock(text, /29\.\s*Primary Fuel Model[\s\S]{0,300}?etc\)?:\s*/i, /Narrative:|30\./i);
  if (!f29raw.trim()) f29raw = grabBlock(text, /29\.\s*Primary Fuel Model[\s\S]{0,600}?:\s*/i, /Narrative:|30\.|31\./i);
  if (!f29raw.trim()) { const m = text.match(/29\.[\s\S]{0,800}?(?=30\.|31\.)/i); if (m) f29raw = m[0]; }
  f.f29 = f29raw;

  // Rows E+F = residences (single + multiple), Rows G+H+I = other structures
  const resRowE = text.match(/E\.\s*Single Residences\s+(\d+)\s+\d+\s+(\d+)/i);
  const resRowF = text.match(/F\.\s*Multiple Residences\s+(\d+)\s+\d+\s+(\d+)/i);
  f.resThreatened = (resRowE ? parseInt(resRowE[1]) : 0) + (resRowF ? parseInt(resRowF[1]) : 0);
  f.resDestroyed  = (resRowE ? parseInt(resRowE[2]) : 0) + (resRowF ? parseInt(resRowF[2]) : 0);

  const strRowG = text.match(/G\.\s*(?:Mixed Use|Mixed Commercial\s*\/?\s*Residential)\s+(\d+)\s+\d+\s+(\d+)/i);
  const strRowH = text.match(/H\.\s*(?:Commercial and Industrial|Nonresidential\s+Commercial\s+Property)\s+(\d+)\s+\d+\s+(\d+)/i);
  const strRowI = text.match(/I\.\s*Other Minor Structures\s+(\d+)\s+\d+\s+(\d+)/i);
  f.strThreatened = (strRowG ? parseInt(strRowG[1]) : 0) + (strRowH ? parseInt(strRowH[1]) : 0) + (strRowI ? parseInt(strRowI[1]) : 0);
  f.strDestroyed  = (strRowG ? parseInt(strRowG[2]) : 0) + (strRowH ? parseInt(strRowH[2]) : 0) + (strRowI ? parseInt(strRowI[2]) : 0);

  f.f34 = parseLifeSafety(text);

  // Box 3: is this a Final report?
  f.isFinal   = /X\s+Final|Final\s+X/i.test(text);
  f.isInitial = /X\s+Initial|Initial\s+X/i.test(text);

  // F43 containment date — '---' if Final or 100% contained, UNK if blank
  // Stop before field 44 to avoid grabbing next label as value
  if (f.isFinal || parseInt(f.f8a) >= 100) {
    f.f43 = '---';
  } else {
    const rawDate = grab(text, /43\.\s*Anticipated Incident Containment[^:]*Date:\s*([^\n]+?)(?=\s*44\.|$)/i);
    const looksLikeLabel = rawDate && /^\d{2}\./.test(rawDate.trim());
    if (!rawDate || looksLikeLabel) {
      f.f43 = 'UNK';
    } else {
      const formatted = formatDate(rawDate);
      // If it parses to M/D, check if that date has already passed — if so, UNK
      const dm = formatted.match(/^(\d{1,2})\/(\d{1,2})$/);
      if (dm) {
        const now = new Date();
        const candidate = new Date(now.getFullYear(), parseInt(dm[1]) - 1, parseInt(dm[2]));
        // If candidate already passed (and isn't implausibly far in the past = wrong year parse)
        f.f43 = (candidate < now && (now - candidate) < 180 * 86400000) ? 'UNK' : formatted;
      } else {
        f.f43 = formatted;
      }
    }
  }

  f.f45 = grab(text, /45\.\s*Estimated Incident Costs[\s\S]{0,30}?:\s*\$?([\d,]+(?:\.\d+)?)/i);

  // Boxes 30,33,35,36,37,38,40,41,47 — scan for threats and precip
  const box30 = grabBlock(text, /30\.\s*[\s\S]{0,200}?:\s*/i, /31\.|Narrative:/i);
  const box33 = grabBlock(text, /33\.\s*[\s\S]{0,200}?:\s*/i, /34\.|Narrative:/i);
  const box35 = grabBlock(text, /35\.\s*[\s\S]{0,200}?:\s*/i, /36\.|Narrative:/i);
  const box36 = grabBlock(text, /36\.\s*[\s\S]{0,200}?:\s*/i, /37\.|Narrative:/i);
  const box37 = grabBlock(text, /37\.\s*[\s\S]{0,200}?:\s*/i, /38\.|Narrative:/i);
  const box38 = grabBlock(text, /38\.\s*[\s\S]{0,600}?:\s*/i, /39\.|Narrative:/i);
  const box40 = grabBlock(text, /40\.\s*[\s\S]{0,200}?:\s*/i, /41\.|Narrative:/i);
  const box41 = grabBlock(text, /41\.\s*[\s\S]{0,200}?:\s*/i, /42\.|Narrative:/i);
  const box47 = grabBlock(text, /47\.\s*[\s\S]{0,200}?:\s*/i, /48\.|Narrative:/i);

  const infraScanText = [box30,box33,box35,box36,box37,box38,box40,box41,box47].join(' ');
  f._infra = detectInfrastructure(infraScanText);
  f._sageGrouse = detectSageGrouse(infraScanText);
  f._precipDetected = detectPrecip(box35 + ' ' + box38 + ' ' + box40 + ' ' + box47);
  f._precipConfirmed = false;  // user must confirm
  f._submitTime = parseSubmitTime(text);

  // Total personnel — Layout A: "52. Total Pers v1 v2 ... TOTAL"
  //                  Layout B: "52. Total v1 v2 ... TOTAL Pers"
  const persMA = text.match(/52\.\s*Total\s+Pers\s+([\d\s]+?)(?=\s*53\.|\s*52\.|$)/i);
  const persMB = text.match(/52\.\s*Total\s+([\d\s]+?)\s+Pers/i);
  const persM  = persMA || persMB;
  if (persM) {
    const vals = persM[1].trim().split(/\s+/).filter(s => /^\d+$/.test(s));
    f.totalPers = vals.length ? vals[vals.length - 1] : '0';
  } else f.totalPers = '0';

  // Fields 4 & 5: IC and IMT organization — detect nationally recognized IMT
  const imtM = text.match(/4\.\s*Incident Commander[\s\S]{0,400}?6\.\s*Incident Start/i);
  f.imtText = imtM ? imtM[0] : text.slice(0, 600); // fallback to top of doc
  // NITE 2.0: "CIMT or NIMO team is assigned — we don't show IMT1, 2 or 3"
  // All ODF/Cal Fire and other IMT1s have converted to CIMT as of 2025.
  f.hasIMT = /\bCIMT\b|\bNIMO\b/i.test(f.imtText);

  // CIMT ASSIGNED / NIMO ASSIGNED label — the narrow imtText regex often misses box 5
  // content in PDF.js two-column layout. Scan first 2000 chars directly instead.
  const headerRegion = text.slice(0, 2000);
  // NIMO gets its own label — check it separately first
  f.hasNIMO = /\bNIMO\b/i.test(headerRegion);
  // hasCIMT: CIMT or ICCI keyword only — Type 1/2 designation retired
  f.hasCIMT = !f.hasNIMO && (
    /\bCIMT\b/i.test(headerRegion) ||
    /\bICCI\b/i.test(headerRegion)
  );

  f.resources = parseResources(text);

  // Origin ownership: Box 21 governs, Box 2 suffix as fallback
  // Box 21 may contain either:
  //   (a) a text description  e.g. "Private Land", "State Agency"
  //   (b) a unit-code style value e.g. "KY-PRI", "AZ-BLM"
  const box21raw = (f.f21 || '').trim();
  const box21val = box21raw.toLowerCase();
  const box2own  = deriveOwn(f.f2);

  // First try: extract suffix from unit-code format (e.g. KY-PRI → PRI, AZ-BLM → BLM)
  const SUFFIX_MAP = {'FS':'FS','BIA':'BIA','BLM':'BLM','NPS':'NPS','FWS':'FWS',
                      'ST':'ST','CNTY':'CNTY','DOW':'DOW','TRI':'TRI','PRI':'PRI'};
  let box21code = null;
  // Match unit-code format at start of value — e.g. "KY-PRI", "AZ-BLM"
  // Use first whitespace-delimited token in case trailing content was captured
  const firstToken = box21raw.split(/\s+/)[0];
  const unitCodeM = firstToken.match(/^[A-Z]{2}-([A-Z]+)$/i);
  if (unitCodeM) {
    const sfx = unitCodeM[1].toUpperCase();
    box21code = SUFFIX_MAP[sfx] || null;
  }

  // Second try: text description patterns
  if (!box21code) {
    const OWN_PATTERNS = [
      { re: /private/,              code: 'PRI'  },
      { re: /\bstate\b/,           code: 'ST'   },
      { re: /tribal/,               code: 'TRI'  },
      { re: /county|local/,         code: 'CNTY' },
      { re: /\bnps\b|national park/,code: 'NPS'  },
      { re: /\bblm\b/,             code: 'BLM'  },
      { re: /\busfs\b|forest service/, code: 'FS' },
      { re: /\bbia\b/,             code: 'BIA'  },
      { re: /\bfws\b|fish and wildlife/, code: 'FWS' },
    ];
    for (const { re, code } of OWN_PATTERNS) {
      if (re.test(box21val)) { box21code = code; break; }
    }
  }

  f.privateLand = box21code === 'PRI';

  // "Started on [agency] land" — Box 21 populated, differs from Box 2, not private
  f.startedOnLand = null;
  if (box21code && box21code !== 'PRI' && box21code !== box2own) {
    const LAND_LABELS = { ST:'state', CNTY:'county', TRI:'tribal', NPS:'NPS', BLM:'BLM', FS:'USFS', BIA:'BIA', FWS:'FWS' };
    f.startedOnLand = LAND_LABELS[box21code] || box21code.toLowerCase();
  }

  // Final origin ownership: Box 21 if resolved, else Box 2
  f.originOwn = box21code || box2own;

  return f;
}

function deriveOwn(incNum) {
  if (!incNum) return '';
  const unit = incNum.replace(/-\d+$/, '');
  const parts = unit.split('-');
  if (parts.length < 2) return '';
  // Use last ALPHA character — some unit codes end in digits (e.g. LG51) and the
  // agency suffix is the trailing letter, not the trailing character.
  const alpha = parts[1].replace(/[^A-Za-z]/g, '');
  const last = alpha ? alpha.slice(-1).toUpperCase() : '';
  const code = {'F':'FS','A':'BIA','D':'BLM','P':'NPS','S':'ST','U':'ST','X':'CNTY','Q':'DOW','R':'FWS','T':'TRI'}[last];
  if (code) return code;
  // Unrecognized suffix — fall back to unit lookup name.
  // If the unit name contains "County" it's a county jurisdiction → CNTY.
  const unitKey = parts.slice(0, 2).join('-'); // e.g. MT-LG51
  const lookupName = (UNIT_LOOKUP[unitKey] || '').toLowerCase();
  if (lookupName.includes('county')) return 'CNTY';
  // Raw suffix as last resort (flags it for human review)
  return last;
}

function lookupUnit(unitCode) {
  if (!unitCode) return '';
  const raw = UNIT_LOOKUP[unitCode] || '';
  // Normalize spelled-out "National Forest(s)" to "NF" — IMSR standard abbreviation
  // Only when it follows another word (e.g. "Flathead National Forest" → "Flathead NF")
  // NOT when it starts the name (e.g. "National Forests in Alabama" stays as-is)
  return raw.replace(/(\S\s+)National Forests?/g, '$1NF');
}

function deriveGACC(f) {
  // Check unit-code override first (e.g. MT-BIP → RMCC)
  const unitCode = (f.f2 || '').toUpperCase().replace(/-\d+$/, '');
  if (UNIT_GACC_OVERRIDE[unitCode]) return UNIT_GACC_OVERRIDE[unitCode];
  const state = (f.f2 || '').slice(0, 2).toUpperCase();
  return STATE_TO_GACC[state] || 'UNKNOWN';
}

function parseLifeSafety(text) {
  // Box 34 + closure checkboxes (N/O/P/Q) occupy the same right-column region.
  // In two-column PDF.js layout, "35. Weather Concerns" label lands inline BEFORE
  // the closure checkboxes in the text stream — stopping at 35. cuts off the closures.
  // Stop at 36. only — closure labels (O/P/Q) always appear before "36. Projected Activity".
  const blockM = text.match(/34\.\s*Life[\s\S]{0,4000}?(?=36\.)/i);
  if (!blockM) return '';
  const scope = blockM[0];

  // Each checkbox: label text followed by "X" within 5 chars (tight),
  // OR "X" followed by label within 5 chars (some PDFs reverse the order).
  function checked(re) {
    // Try tight forward match first (label … X), then reverse (X … label)
    return /Active\?[\s\S]{0,1000}/.test(scope)
      ? re.test(scope)   // normal: use extracted block
      : re.test(text);   // fallback: full text
  }

  // Closure detection — two rendering patterns:
  //
  // Style B (PDF.js per-label): X appears RIGHT after each checked label
  //   "O. Road Closure X  P. Trail Closure  Q. Area Closure X"
  //   → label\s+X catches each individually
  //
  // Style A (PDF.js clustered): all labels come first, then X cluster after Q
  //   "O. Road Closure  P. Trail Closure  Q. Area Closure  X  X"
  //   → label\s+X only catches Q (last label, X immediately follows)
  //   → count Xs after Q: 1=Q, 2=P+Q, 3+=O+P+Q
  //
  // Direct detection (works for Style B, and Style A for Q):
  const hasQ_direct = /Q\.\s*Area\s+Closure\s+X/i.test(scope);
  const hasP_direct = /P\.\s*Trail\s+Closure\s+X/i.test(scope);
  const hasO_direct = /O\.\s*Road\s+Closure\s+X/i.test(scope);

  // Style A fallback — count Xs in tight window after Q.Area label
  const qTail = (scope.match(/Q\.\s*Area\s+Closure([\s\S]{0,60})/i) || ['',''])[1];
  const xsAfterQ = (qTail.match(/\bX\b/g) || []).length;

  const hasEvac  = /H\.\s*Evacuation\(s\)\s+in\s+Progress\s+X/i.test(scope);
  const hasArea  = hasQ_direct || xsAfterQ >= 1;
  const hasTrail = hasP_direct || xsAfterQ >= 2;
  const hasRoad  = hasO_direct || xsAfterQ >= 3;

  if (!hasEvac && !hasArea && !hasRoad && !hasTrail) return '';

  const closures = [];
  if (hasArea)  closures.push('area');
  if (hasRoad)  closures.push('road');
  if (hasTrail) closures.push('trail');

  // Build one combined statement — single "in effect" at the end.
  // Always plural "closures" even for a single closure type.
  // Examples:
  //   Evacuations in effect
  //   Area closures in effect
  //   Area and road closures in effect
  //   Area, road and trail closures in effect
  //   Evacuations and area closures in effect
  //   Evacuations, area and road closures in effect
  //   Evacuations, area, road and trail closures in effect
  if (!hasEvac) {
    if (closures.length === 1) {
      return closures[0].charAt(0).toUpperCase() + closures[0].slice(1) + ' closures in effect';
    } else if (closures.length === 2) {
      return closures[0].charAt(0).toUpperCase() + closures[0].slice(1) + ' and ' + closures[1] + ' closures in effect';
    } else {
      return 'Area, road and trail closures in effect';
    }
  }

  if (closures.length === 0) {
    return 'Evacuations in effect';
  } else if (closures.length === 1) {
    return 'Evacuations and ' + closures[0] + ' closures in effect';
  } else if (closures.length === 2) {
    return 'Evacuations, ' + closures[0] + ' and ' + closures[1] + ' closures in effect';
  } else {
    return 'Evacuations, area, road and trail closures in effect';
  }
}

function parseResources(text) {
  const res = { crews: 0, engines: 0, helicopters: 0 };

  // Classify English-name columns (bulk 209 format)
  const isHeliEng    = n => /\bHelicopter,?\s*Type\s+\d+\b/i.test(n);
  const isEngineEng  = n => /\bEngine,\s*Type\s+\d+\b/i.test(n);   // strict — excludes airtankers
  const isCrewEng    = n => /\bCrew,?\s*Type\s+\d+\b/i.test(n);

  // Classify short-code columns (individual 209 format: HEL1, ENG3, CR1 etc)
  const isHeliCode   = c => /^HEL/.test(c);
  const isEngineCode = c => /^ENG/.test(c);
  const isCrewCode   = c => /^CR[1-9W]|^CR\d+IA|^CRW/.test(c);

  // Find resource table header — "48. Agency or Org ..." or "Agency or Org ..."
  const hdrM = text.match(/(?:48\.\s*)?Agency\s+or\s+Org\s+(.*?)\s+(?=[A-Z]{1,5}\s+Rsrc)/i);
  if (!hdrM) return res;

  const colArea = hdrM[1].trim();

  // Detect format: English names have "Type N" patterns; short codes don't
  const isEnglish = /,\s*Type\s+\d+/i.test(colArea);

  let colTypes = [];
  if (isEnglish) {
    // Split on 2+ spaces — English names contain single spaces internally
    const rawCols = colArea.split(/\s{2,}/);
    const cols = rawCols.map(c => c.trim()).filter(c => c && !/^(total|overhead)$/i.test(c));
    colTypes = cols.map(c => isHeliEng(c) ? 'heli' : isEngineEng(c) ? 'engine' : isCrewEng(c) ? 'crew' : null);
  } else {
    // Short code format — extract codes, skip category labels
    const skip = new Set(['AIRCRAFT','CREWS','EQUIPMENT','OVERHEAD','TOTAL','AERIAL','OR','ORG']);
    const codes = [...colArea.matchAll(/\b([A-Z]{2,6}\d*(?:IA)?)\b/g)]
      .map(m => m[1]).filter(c => !skip.has(c));
    colTypes = codes.map(c => isHeliCode(c) ? 'heli' : isEngineCode(c) ? 'engine' : isCrewCode(c) ? 'crew' : null);
  }

  // Get 52. Total Rsrc row.
  // Layout A (standard): "52. Total Rsrc [rsrc values] 52. Total Pers [pers values]"
  // Layout B (single-agency PDFs): "52. Total Rsrc  52. Total Pers  [all values interleaved
  //   column-by-column as Rsrc,Pers pairs]" — both labels appear before any numbers.
  const rsrcM = text.match(/(?:52|57)\.\s*Total\s+Rsrc\s+([\d\s]+?)(?=(?:52|57)\.\s*Total\s+Pers|53\.)/i);

  let vals = [];
  let persVals = [];

  if (rsrcM && rsrcM[1].trim()) {
    // Layout A — numbers between the two labels
    vals = rsrcM[1].trim().split(/\s+/).filter(s => /^\d+$/.test(s)).map(Number);

    // Get 52. Total Pers row for crew minimum enforcement
    const persRowMA = text.match(/(?:52|57)\.\s*Total\s+Pers\s+([\d\s]+?)(?=\s*53\.|\s*52\.|$)/i);
    const persRowMB = text.match(/(?:52|57)\.\s*Total\s+([\d\s]+?)\s+Pers/i);
    const persRowM  = persRowMA || persRowMB;
    persVals = persRowM ? persRowM[1].trim().split(/\s+/).filter(s => /^\d+$/.test(s)).map(Number) : [];
  } else {
    // Layout B — both labels before all values; values are column-by-column Rsrc/Pers pairs.
    // Match the block that starts after both "Total Rsrc" and "Total Pers" labels.
    const interM = text.match(/(?:52|57)\.\s*Total\s+Rsrc\s+(?:52|57)\.\s*Total\s+Pers\s+([\d\s]+?)(?=53\.|$)/i);
    if (!interM) return res;
    const all = interM[1].trim().split(/\s+/).filter(s => /^\d+$/.test(s)).map(Number);
    // Values alternate: col0_Rsrc, col0_Pers, col1_Rsrc, col1_Pers, ...
    // Take even-indexed for Rsrc, odd-indexed for Pers
    vals     = all.filter((_, i) => i % 2 === 0);
    persVals = all.filter((_, i) => i % 2 === 1);
  }

  if (!vals.length) return res;

  colTypes.forEach((t, i) => {
    if (i >= vals.length) return;
    if (t === 'heli')        res.helicopters += vals[i];
    else if (t === 'engine') res.engines     += vals[i];
    else if (t === 'crew') {
      // Accumulate crew personnel for post-loop calculation
      const crewPers = (persVals.length > 0 && i < persVals.length) ? persVals[i] : null;
      res._crewPersTotal = (res._crewPersTotal || 0) + (crewPers !== null ? crewPers : vals[i] * 18);
      res._crewRsrcTotal = (res._crewRsrcTotal || 0) + vals[i];
    }
  });

  // NWCG crew standard: minimum 18 personnel per crew.
  // Correct reported crew count using floor(total_crew_personnel / 18).
  // If no personnel data available, trust the reported count.
  if (res._crewRsrcTotal > 0) {
    const totalCrewPers = res._crewPersTotal || 0;
    res.crews = totalCrewPers > 0 ? Math.floor(totalCrewPers / 18) : 0;
  }

  return res;
}

function parseSubmitTime(text) {
  // Box 14: Date/Time Submitted — use wide window to handle PDF.js column-scramble
  // where the value lands after Box 15 content rather than immediately after the label.
  const b14 = text.match(/14\.\s*Date\/Time Submitted:[\s\S]{0,200}?(\d{1,2}\/\d{1,2}\/\d{4}\s+\d{3,4})/i);
  const b12 = text.match(/Date\/Time Prepared:\s*(\d{1,2}\/\d{1,2}\/\d{4}\s+\d{3,4})/i);
  const raw = (b14 && b14[1]) || (b12 && b12[1]) || '';
  if (!raw) return Infinity; // no date found → sort to end (as-parsed relative to others with no date)
  const m = raw.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{3,4})/);
  if (!m) return Infinity;
  const [, mo, dy, yr, hhmm] = m;
  return parseInt(yr + mo.padStart(2,'0') + dy.padStart(2,'0') + hhmm.padStart(4,'0'));
}

function formatCost(raw) {
  if (!raw) return 'NR';
  const n = Number(raw.replace(/,/g, ''));
  if (isNaN(n) || n < 500) return 'NR';
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1000)    return Math.round(n / 1000) + 'K';
  return '1K';  // $500-$999
}
